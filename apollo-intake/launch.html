<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Apollo — Launch Mission</title>
  <link rel="manifest" href="/apollo/manifest.json">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Apollo">
  <link rel="apple-touch-icon" sizes="192x192" href="/apollo/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/apollo/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/apollo/shared/theme.css">

  <style>
  /* Page-specific wizard layout. Reusable bits (glass, LED, buttons,
     fields, command bar, auth modal, hero) live in theme.css. */

  /* ============================================================
     Wizard — aerospace mission control aesthetic
     ============================================================ */

  .wiz-wrap {
    max-width: var(--content-max);
    margin: 0 auto;
    padding: var(--s-7) var(--content-pad-x) var(--s-9);
    width: 100%;
  }
  @media (max-width: 720px) {
    .wiz-wrap { padding: var(--s-5) var(--content-pad-x-mobile) var(--s-8); }
  }

  .wiz-loading {
    text-align: center;
    color: var(--ivory-3);
    padding: var(--s-9) var(--s-5);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: var(--track-mono);
    text-transform: uppercase;
  }

  /* --- Step indicator: tight horizontal marks, no bubbles --- */
  .wiz-steps-wrap {
    margin: 0 0 var(--s-7) 0;
    padding-bottom: var(--s-3);
    border-bottom: var(--rule);
  }
  .wiz-steps-meta {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: var(--s-2);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: var(--track-mono);
    text-transform: uppercase;
    color: var(--ivory-2);
  }
  .wiz-steps-meta .left { color: var(--ivory); }
  .wiz-steps-meta .right { color: var(--ivory-3); }

  .wiz-step-marks { display: flex; gap: var(--s-2); width: 100%; }
  .wiz-step-mark {
    height: 3px;
    flex: 1 1 0;
    background: var(--titanium);
    transition: background var(--dur-base) var(--ease-cinematic);
  }
  .wiz-step-mark.done   { background: var(--cyan-go); }
  .wiz-step-mark.active { background: var(--ignition); }

  /* --- Stage: a graphite slab, no glass, no border, sharp corners --- */
  .wiz-stage {
    background: var(--graphite);
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    border: none;
    border-radius: var(--radius-card);
    padding: var(--s-8) var(--s-7);
    box-shadow: none;
  }
  @media (max-width: 720px) {
    .wiz-stage { padding: var(--s-6) var(--s-4); }
  }

  /* --- Wizard header within a step --- */
  .wiz-head {
    text-align: left;
    margin-bottom: var(--s-7);
    padding-bottom: var(--s-5);
    border-bottom: var(--rule);
  }
  .wiz-head h2 {
    margin: 0 0 var(--s-2) 0;
    font-family: var(--font-display);
    font-size: clamp(28px, 4vw, 36px);
    font-weight: 700;
    letter-spacing: var(--track-tight);
    line-height: 1.1;
    color: var(--ivory);
    /* explicitly NO gradient text */
    background: none;
    -webkit-text-fill-color: var(--ivory);
  }
  .wiz-subtle {
    margin: 0 0 var(--s-3) 0;
    font-size: 15px;
    line-height: 1.55;
    color: var(--ivory-2);
    max-width: 580px;
  }

  /* Mission telemetry strip — the mono line under the headline */
  .wiz-telemetry {
    display: flex;
    flex-wrap: wrap;
    gap: var(--s-4);
    margin-top: var(--s-4);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: var(--track-mono-tight);
    color: var(--ivory-3);
    text-transform: uppercase;
  }
  .wiz-telemetry .sep {
    color: var(--titanium);
    user-select: none;
  }
  .wiz-telemetry .code {
    color: var(--ivory);
    letter-spacing: var(--track-mono-tight);
  }

  /* --- Section header within a step (BRAND / STYLE / etc.) --- */
  .wiz-section-title {
    margin: var(--s-7) 0 var(--s-4) 0;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: var(--track-mono);
    text-transform: uppercase;
    color: var(--ivory-2);
  }
  .wiz-section-title:first-child { margin-top: 0; }

  /* --- Slab list: full-width rows separated by hairlines --- */
  .wiz-slab-list {
    display: flex;
    flex-direction: column;
    margin: 0 calc(-1 * var(--s-7));
  }
  @media (max-width: 720px) { .wiz-slab-list { margin: 0 calc(-1 * var(--s-4)); } }

  .wiz-slab {
    position: relative;
    display: grid;
    grid-template-columns: 80px 1fr auto;
    align-items: center;
    gap: var(--s-5);
    padding: var(--s-5) var(--s-7);
    background: transparent;
    border: none;
    border-top: var(--rule);
    cursor: pointer;
    text-align: left;
    font-family: inherit;
    color: var(--ivory);
    transition: background var(--dur-base) var(--ease-cinematic);
  }
  .wiz-slab:last-child { border-bottom: var(--rule); }
  .wiz-slab:hover { background: var(--graphite-rise); }
  .wiz-slab.selected { background: var(--graphite-high); }
  .wiz-slab.selected::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--ignition);
  }
  @media (max-width: 720px) {
    .wiz-slab {
      grid-template-columns: 56px 1fr auto;
      gap: var(--s-4);
      padding: var(--s-4) var(--s-4);
    }
  }

  .wiz-slab-thumb {
    width: 60px;
    height: 80px;
    background: var(--vacuum);
    border: var(--rule-low);
    display: block;
    object-fit: cover;
    flex-shrink: 0;
  }
  .wiz-slab-thumb-empty {
    width: 60px;
    height: 80px;
    background: var(--vacuum);
    border: var(--rule-low);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ivory-4);
    font-family: var(--font-mono);
    font-size: 18px;
  }
  @media (max-width: 720px) {
    .wiz-slab-thumb, .wiz-slab-thumb-empty { width: 44px; height: 56px; }
  }

  .wiz-slab-body { min-width: 0; }
  .wiz-slab-title {
    font-size: 17px;
    font-weight: 600;
    color: var(--ivory);
    margin: 0 0 4px 0;
    letter-spacing: var(--track-tight);
  }
  .wiz-slab-desc {
    font-size: 13px;
    line-height: 1.5;
    color: var(--ivory-2);
    margin: 0;
  }
  .wiz-slab-state {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: var(--track-mono);
    text-transform: uppercase;
    color: var(--ivory-3);
  }
  .wiz-slab.selected .wiz-slab-state { color: var(--ignition); }

  /* --- Form fields: bottom-border only, no boxes --- */
  .wiz-form { display: flex; flex-direction: column; gap: var(--s-5); }
  .wiz-field { display: flex; flex-direction: column; gap: var(--s-2); }
  .wiz-field label {
    display: flex;
    align-items: center;
    gap: var(--s-2);
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: var(--track-mono);
    text-transform: uppercase;
    color: var(--ivory-2);
  }
  .wiz-req {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--ignition);
  }
  .wiz-field input,
  .wiz-field textarea,
  .wiz-field select {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--titanium);
    border-radius: 0;
    padding: var(--s-3) 0;
    color: var(--ivory);
    font-family: var(--font-body);
    font-size: 15px;
    transition: border-color var(--dur-base) var(--ease-cinematic);
    width: 100%;
  }
  .wiz-field textarea {
    border: 1px solid var(--titanium);
    padding: var(--s-3) var(--s-4);
    min-height: 96px;
    resize: vertical;
    line-height: 1.55;
  }
  .wiz-field input::placeholder,
  .wiz-field textarea::placeholder { color: var(--ivory-4); }
  .wiz-field input:focus,
  .wiz-field textarea:focus,
  .wiz-field select:focus {
    outline: none;
    border-color: var(--cyan-go);
    border-bottom-width: 2px;
    box-shadow: none;
  }
  .wiz-field.has-error input,
  .wiz-field.has-error textarea,
  .wiz-field.has-error select { border-color: var(--alert); }

  .wiz-help {
    font-size: 12px;
    color: var(--ivory-3);
    line-height: 1.55;
    margin: 0;
  }
  .wiz-inline-err {
    font-size: 12px;
    font-family: var(--font-mono);
    letter-spacing: var(--track-mono-tight);
    color: var(--alert);
  }
  .wiz-inline-err::before { content: '! '; }
  .wiz-error-banner {
    background: transparent;
    border: 1px solid var(--alert);
    border-left-width: 3px;
    color: var(--alert);
    padding: var(--s-3) var(--s-4);
    margin: var(--s-5) 0;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: var(--track-mono-tight);
  }

  /* --- Multi-select chips --- */
  .wiz-chips { display: flex; flex-wrap: wrap; gap: var(--s-2); }
  .wiz-chip {
    display: inline-flex;
    align-items: center;
    padding: var(--s-2) var(--s-4);
    background: transparent;
    border: 1px solid var(--titanium);
    border-radius: var(--radius-control);
    font-size: 13px;
    cursor: pointer;
    color: var(--ivory-2);
    transition: all var(--dur-base) var(--ease-cinematic);
  }
  .wiz-chip input { display: none; }
  .wiz-chip.on,
  .wiz-chip:hover {
    border-color: var(--ignition);
    color: var(--ignition);
  }

  /* --- Optional fields collapsible --- */
  .wiz-optional {
    background: transparent;
    border: var(--rule);
    border-left: none;
    border-right: none;
    padding: var(--s-4) 0;
    margin-top: var(--s-2);
  }
  .wiz-optional summary {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: var(--track-mono);
    color: var(--ivory-2);
    cursor: pointer;
    text-transform: uppercase;
    padding: 0;
    list-style: none;
  }
  .wiz-optional summary::-webkit-details-marker { display: none; }
  .wiz-optional summary::before {
    content: '+ ';
    color: var(--ignition);
  }
  .wiz-optional[open] summary::before { content: '− '; }
  .wiz-optional[open] { padding-bottom: var(--s-5); }
  .wiz-optional[open] summary {
    margin-bottom: var(--s-5);
    border-bottom: var(--rule);
    padding-bottom: var(--s-3);
  }

  /* --- File upload: hairline drop zone, no rounded corners --- */
  .wiz-upload-slot {
    border: var(--rule);
    border-left: none;
    border-right: none;
    padding: var(--s-5) 0;
    margin-bottom: var(--s-5);
  }
  .wiz-upload-slot:last-child { margin-bottom: 0; }
  .wiz-upload-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: var(--s-3);
    flex-wrap: wrap;
    gap: var(--s-2);
  }
  .wiz-upload-title {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: var(--track-mono);
    color: var(--ivory);
    text-transform: uppercase;
  }
  .wiz-upload-meta {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: var(--track-mono-tight);
    color: var(--ivory-3);
    text-transform: uppercase;
  }
  .wiz-upload-help {
    font-size: 13px;
    line-height: 1.55;
    color: var(--ivory-2);
    margin: 0 0 var(--s-4) 0;
    max-width: 580px;
  }
  .wiz-upload-zone {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--s-3);
    min-height: 96px;
    padding: var(--s-4);
    border: 1px dashed var(--titanium);
    background: transparent;
    cursor: pointer;
    transition: all var(--dur-base) var(--ease-cinematic);
  }
  .wiz-upload-zone:hover,
  .wiz-upload-zone.hot {
    border-color: var(--ignition);
    border-style: solid;
    background: var(--graphite-rise);
  }
  .wiz-upload-zone svg { width: 24px; height: 24px; color: var(--ignition); }
  .wiz-upload-cta {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: var(--track-mono);
    text-transform: uppercase;
    color: var(--ivory);
  }
  .wiz-upload-list {
    margin-top: var(--s-4);
    padding-top: var(--s-4);
    border-top: var(--rule-low);
  }
  .wiz-upload-list-head {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: var(--track-mono);
    color: var(--ivory-3);
    text-transform: uppercase;
    margin-bottom: var(--s-3);
  }
  .wiz-upload-row {
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    gap: var(--s-3);
    align-items: center;
    padding: var(--s-2) 0;
    font-size: 13px;
    border-bottom: var(--rule-low);
  }
  .wiz-upload-row:last-child { border-bottom: none; }
  .wiz-upload-row.pending { opacity: 0.5; }
  .wiz-upload-icon { font-family: var(--font-mono); font-size: 14px; color: var(--ivory-3); }
  .wiz-upload-name {
    color: var(--ivory);
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: var(--track-mono-tight);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .wiz-upload-size {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: var(--track-mono-tight);
    color: var(--ivory-3);
  }
  .wiz-upload-remove {
    background: transparent;
    border: 1px solid var(--titanium);
    border-radius: var(--radius-control);
    color: var(--ivory-3);
    width: 24px; height: 24px;
    cursor: pointer;
    font-size: 12px;
    line-height: 1;
    transition: all var(--dur-base) var(--ease-cinematic);
  }
  .wiz-upload-remove:hover { border-color: var(--alert); color: var(--alert); }

  /* --- Review panel --- */
  .wiz-review {
    background: transparent;
    border: var(--rule);
    border-left: 3px solid var(--ignition);
    padding: var(--s-5) var(--s-6);
  }
  .wiz-review h3 {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: var(--track-mono);
    text-transform: uppercase;
    color: var(--ivory);
    margin: var(--s-5) 0 var(--s-3) 0;
    padding-bottom: var(--s-2);
    border-bottom: var(--rule-low);
  }
  .wiz-review h3:first-child { margin-top: 0; }
  .wiz-review-row {
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: var(--s-3);
    padding: var(--s-3) 0;
    border-bottom: var(--rule-low);
    font-size: 14px;
    align-items: baseline;
  }
  .wiz-review-row:last-of-type { border-bottom: none; }
  .wiz-review-k {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: var(--track-mono);
    text-transform: uppercase;
    color: var(--ivory-3);
  }
  .wiz-review-v { color: var(--ivory); word-break: break-word; line-height: 1.55; }
  .wiz-review-files { list-style: none; padding: 0; margin: var(--s-2) 0 0 0; }
  .wiz-review-files li {
    display: flex;
    justify-content: space-between;
    padding: var(--s-2) 0;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: var(--track-mono-tight);
    border-bottom: var(--rule-low);
  }
  .wiz-review-files li:last-child { border-bottom: none; }
  .wiz-review-files-meta { color: var(--ivory-3); }
  @media (max-width: 600px) { .wiz-review-row { grid-template-columns: 1fr; gap: var(--s-1); } }

  /* --- Result wrap (Step 6: generate) --- */
  .wiz-result-wrap { text-align: left; padding: var(--s-7) 0; }
  .wiz-result-status {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: var(--track-mono);
    text-transform: uppercase;
    color: var(--ignition);
    margin-bottom: var(--s-3);
  }
  .wiz-result-status.complete { color: var(--confirm); }
  .wiz-result-status.failed   { color: var(--alert); }
  .wiz-result-headline {
    font-family: var(--font-display);
    font-size: clamp(32px, 5vw, 44px);
    font-weight: 700;
    letter-spacing: var(--track-tight);
    line-height: 1.05;
    color: var(--ivory);
    margin: 0 0 var(--s-4) 0;
  }
  .wiz-result-meta {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: var(--track-mono-tight);
    color: var(--ivory-3);
    margin: 0 0 var(--s-7) 0;
  }
  .wiz-result-actions {
    display: flex;
    gap: var(--s-3);
    flex-wrap: wrap;
  }

  /* --- Buttons (override the .btn rules from theme.css for the wizard nav) --- */
  .wiz-nav {
    display: flex;
    justify-content: space-between;
    gap: var(--s-3);
    margin-top: var(--s-7);
    padding-top: var(--s-5);
    border-top: var(--rule);
  }
  .wiz-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: var(--s-2);
    height: 56px;
    padding: 0 var(--s-6);
    background: transparent;
    border: 1px solid var(--ivory);
    border-radius: var(--radius-control);
    color: var(--ivory);
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: var(--track-mono);
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    transition: all var(--dur-base) var(--ease-cinematic);
  }
  .wiz-btn:hover { background: var(--ivory); color: var(--vacuum); }
  .wiz-btn[disabled] {
    border-color: var(--titanium);
    color: var(--ivory-4);
    cursor: not-allowed;
    background: transparent;
  }
  .wiz-btn-primary {
    background: var(--ignition);
    border-color: var(--ignition);
    color: var(--vacuum);
    min-width: 200px;
  }
  .wiz-btn-primary:hover {
    background: var(--ignition-dim);
    border-color: var(--ignition-dim);
    color: var(--ivory);
  }
  .wiz-btn-primary[disabled] {
    background: var(--graphite-high);
    border-color: var(--graphite-high);
    color: var(--ivory-4);
  }
  .wiz-btn-go {
    background: var(--cyan-go);
    border-color: var(--cyan-go);
    color: var(--vacuum);
    min-width: 200px;
  }

  /* --- Pricing line in the head --- */
  .wiz-price-line {
    display: inline-flex;
    align-items: baseline;
    gap: var(--s-3);
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: var(--track-mono-tight);
    margin-top: var(--s-3);
  }
  .wiz-price-line .price-strike {
    text-decoration: line-through;
    color: var(--ivory-4);
    font-size: 12px;
  }
  .wiz-price-line .price-active {
    color: var(--ignition);
    text-transform: uppercase;
    letter-spacing: var(--track-mono);
    font-weight: 600;
  }
  .wiz-price-line .price-meta { color: var(--ivory-3); }

  /* --- Reduced motion --- */
  @media (prefers-reduced-motion: reduce) {
    .wiz-step-mark, .wiz-slab, .wiz-btn, .wiz-chip,
    .wiz-upload-zone, .wiz-field input, .wiz-field textarea {
      transition: none !important;
    }
  }
  </style>
</head>
<body data-standby="true">

<!-- Hero, command bar, auth modal injected at boot -->

<main class="wiz-wrap" data-aerospace="v1">
  <div id="wizardRoot">
    <div class="wiz-loading">Loading deliverable…</div>
  </div>
</main>

<div id="toastHost"></div>

<script type="module">
import * as hero from '/apollo/shared/hero.js';
import * as authModal from '/apollo/shared/auth-modal.js';
import * as commandBar from '/apollo/shared/command-bar.js';
import * as drafts from '/apollo/shared/drafts.js';
import * as uploads from '/apollo/shared/uploads.js';
import { requireAuth } from '/apollo/shared/auth.js';
import { getDeliverable } from '/apollo/shared/catalog.js';
import { apiJson } from '/apollo/shared/api.js';
import {
  el, toast, escapeHtml, escapeAttr,
  formatPriceCents, bytesToHuman, priceLineEl,
  uploadIcon, rocketIcon,
} from '/apollo/shared/ui.js';

const params = new URLSearchParams(location.search);
const slug = params.get('slug');
if (!slug) location.replace('/apollo/');

drafts.purgeOld();
hero.inject();
authModal.mount({ status: 'loading' });

// Wizard state — page-local. Maps to the spec's state.wizard model.
const state = {
  template: null,
  brand_slug: null,
  style_id: null,
  step: 1,
  fields: {},
  uploads: [],
  pendingUploads: [],
  validation_errors: {},
  validation_general: null,
  uploadError: null,
  submitting: false,
  result: null,
  error: null,
  missionCode: null,
};

requireAuth({
  onSignedOut: () => {
    authModal.updateStatus({ status: 'signed-out' });
  },
  onNotAuthorized: (email) => {
    authModal.updateStatus({ status: 'not-authorized', email });
  },
  onAuthed: async (user) => {
    authModal.dismiss();
    document.body.dataset.standby = 'false';

    state.brand_slug = localStorage.getItem('apollo:brand') || 'apollo';

    commandBar.mount({
      user,
      brand: state.brand_slug,
      brands: ['apollo', 'atlas', 'on-spot-solutions'],
      status: 'operational',
      onBrandChange: (s) => {
        state.brand_slug = s;
        localStorage.setItem('apollo:brand', s);
        renderWizard();
      },
    });
    commandBar.startClock();

    await bootWizard(slug);
  },
});

async function bootWizard(slug) {
  let detail = null;
  try {
    detail = await getDeliverable(slug);
  } catch (err) {
    toast('Could not load template: ' + (err && err.message || String(err)), { variant: 'error' });
    location.replace('/apollo/');
    return;
  }
  if (!detail) {
    toast('Deliverable not available', { variant: 'error' });
    location.replace('/apollo/');
    return;
  }
  state.template = detail;

  // Default style from server, or first available.
  if (!state.style_id) {
    state.style_id =
      detail.default_style_id ||
      (detail.available_styles && detail.available_styles[0]?.id) ||
      null;
  }

  // Resume saved draft if present and fresh.
  const draft = drafts.load(slug, state.brand_slug);
  if (draft) {
    if (draft.fields) state.fields = draft.fields;
    if (draft.style_id) state.style_id = draft.style_id;
    if (typeof draft.step === 'number') state.step = Math.max(1, Math.min(6, draft.step));
    if (Array.isArray(draft.upload_ids) && draft.upload_ids.length) {
      rehydrateDraftUploads(draft.upload_ids);
    }
  }

  renderWizard();
}

async function rehydrateDraftUploads(ids) {
  const results = [];
  for (const id of ids) {
    try {
      const u = await uploads.getOne(id);
      if (u) results.push(u);
    } catch {}
  }
  state.uploads = results;
  renderWizard();
}

function saveDraft() {
  if (!state.template) return;
  drafts.save(state.template.slug, state.brand_slug, {
    step: state.step,
    brand_slug: state.brand_slug,
    style_id: state.style_id,
    fields: state.fields,
    upload_ids: (state.uploads || []).map((u) => u.id),
  });
}
let draftSaveTimer = null;
function saveDraftDebounced() {
  if (draftSaveTimer) clearTimeout(draftSaveTimer);
  draftSaveTimer = setTimeout(() => { draftSaveTimer = null; saveDraft(); }, 500);
}
function clearDraftForCurrent() {
  if (!state.template) return;
  drafts.clear(state.template.slug, state.brand_slug);
}

// ---- Step navigation ----
function wizardStepList() {
  const t = state.template;
  const hasFiles = !!(t && Array.isArray(t.file_upload_prompts) && t.file_upload_prompts.length);
  const all = [
    { key: 'identity', label: 'Identity', n: 1 },
    { key: 'required', label: 'Required', n: 2 },
    { key: 'optional', label: 'Optional', n: 3 },
    { key: 'files',    label: 'Files',    n: 4 },
    { key: 'review',   label: 'Review',   n: 5 },
    { key: 'generate', label: 'Generate', n: 6 },
  ];
  return hasFiles ? all : all.filter((s) => s.key !== 'files');
}
function wizardNext() {
  const list = wizardStepList();
  const idx = list.findIndex((s) => s.n === state.step);
  if (idx === -1 || idx === list.length - 1) return;
  state.step = list[idx + 1].n;
  saveDraft();
  renderWizard();
}
function wizardBack() {
  const list = wizardStepList();
  const idx = list.findIndex((s) => s.n === state.step);
  if (idx <= 0) return;
  state.step = list[idx - 1].n;
  saveDraft();
  renderWizard();
}

// ---- Top-level render ----
function renderWizard() {
  const root = document.getElementById('wizardRoot');
  if (!root) return;
  const t = state.template;
  if (!t) {
    root.innerHTML = '<div class="wiz-loading">Loading deliverable…</div>';
    return;
  }
  root.innerHTML = '';
  root.appendChild(renderStepBar());
  const stage = el('div', { class: 'wiz-stage' });
  root.appendChild(stage);
  if (state.step === 1) renderStep1Identity(stage);
  else if (state.step === 2) renderStep2Required(stage);
  else if (state.step === 3) renderStep3Optional(stage);
  else if (state.step === 4) renderStep4Files(stage);
  else if (state.step === 5) renderStep5Review(stage);
  else if (state.step === 6) renderStep6Generate(stage);
}

function renderStepBar() {
  const list = wizardStepList();
  const idx = list.findIndex((s) => s.n === state.step);
  const currentLabel = list[idx]?.label || '';
  const totalSteps = list.length;
  const stepNum = String(idx + 1).padStart(2, '0');
  const totalNum = String(totalSteps).padStart(2, '0');

  const meta = el('div', { class: 'wiz-steps-meta' },
    el('span', { class: 'left' },
      'STEP ' + stepNum + ' / ' + totalNum + ' — ' + currentLabel.toUpperCase()),
    el('span', { class: 'right' }, missionCodeFor(state.template) || ''),
  );
  const marks = el('div', { class: 'wiz-step-marks' });
  list.forEach((s, i) => {
    const cls = i < idx ? 'done' : i === idx ? 'active' : '';
    marks.appendChild(el('div', { class: 'wiz-step-mark ' + cls }));
  });
  return el('div', { class: 'wiz-steps-wrap' }, meta, marks);
}

// Mission code generator: brand prefix + slug prefix + date + 6-char nonce.
// Stored on state so it stays stable across re-renders.
function missionCodeFor(template) {
  if (!template) return '';
  if (state.missionCode) return state.missionCode;
  const brand = (state.brand_slug || 'apollo').slice(0, 3).toUpperCase();
  const slug = (template.slug || 'doc').toUpperCase().replace(/[^A-Z]/g, '').slice(0, 6);
  const date = new Date().toISOString().slice(0, 10);
  const nonce = Math.random().toString(36).slice(2, 8).toUpperCase();
  state.missionCode = brand + '-' + slug + '-' + date + '-' + nonce;
  return state.missionCode;
}

// ---- Step 1: Identity ----
const BRAND_LABELS = {
  apollo: 'Apollo',
  atlas: 'Atlas',
  'on-spot-solutions': 'On Spot Solutions',
  other: 'Unbranded',
};

const BRAND_DESC = {
  apollo: 'Mission control parent brand.',
  atlas: 'Mapping and observability platform.',
  'on-spot-solutions': 'Field operations and service.',
  other: 'Unbranded — neutral document, no logo or palette.',
};

function renderStep1Identity(host) {
  const t = state.template;

  // Header: deliverable label + description + telemetry strip
  const head = el('div', { class: 'wiz-head' });
  head.appendChild(el('h2', null, t.label));
  if (t.description) {
    head.appendChild(el('p', { class: 'wiz-subtle' }, t.description));
  }
  // Telemetry: mission code · pages · est minutes · price
  const telemetry = el('div', { class: 'wiz-telemetry' });
  telemetry.appendChild(el('span', { class: 'code' }, missionCodeFor(t)));
  if (typeof t.estimated_pages_min === 'number' && typeof t.estimated_pages_max === 'number') {
    telemetry.appendChild(el('span', { class: 'sep' }, '·'));
    const pages = t.estimated_pages_min === t.estimated_pages_max
      ? t.estimated_pages_min + ' PAGES'
      : t.estimated_pages_min + '–' + t.estimated_pages_max + ' PAGES';
    telemetry.appendChild(el('span', null, pages));
  }
  if (t.estimated_minutes) {
    telemetry.appendChild(el('span', { class: 'sep' }, '·'));
    telemetry.appendChild(el('span', null, '~' + t.estimated_minutes + ' MIN'));
  }
  telemetry.appendChild(el('span', { class: 'sep' }, '·'));
  telemetry.appendChild(el('span', { class: 'price-active' }, 'FREE PREVIEW'));
  head.appendChild(telemetry);
  host.appendChild(head);

  // Brand picker — slab list, defaults to current brand_slug
  host.appendChild(el('h3', { class: 'wiz-section-title' }, 'Brand Identity'));
  const brandList = el('div', { class: 'wiz-slab-list' });
  for (const slug of ['apollo', 'atlas', 'on-spot-solutions', 'other']) {
    const sel = state.brand_slug === slug;
    const label = BRAND_LABELS[slug] || slug;
    const slab = el('button', {
      class: 'wiz-slab' + (sel ? ' selected' : ''),
      type: 'button',
      onclick: () => {
        state.brand_slug = slug;
        document.documentElement.dataset.brand = slug;
        saveDraft();
        renderWizard();
      },
    },
      el('div', { class: 'wiz-slab-thumb-empty' }, label.charAt(0).toUpperCase()),
      el('div', { class: 'wiz-slab-body' },
        el('div', { class: 'wiz-slab-title' }, label),
        el('div', { class: 'wiz-slab-desc' }, BRAND_DESC[slug] || ''),
      ),
      el('div', { class: 'wiz-slab-state' }, sel ? 'SELECTED' : 'SELECT'),
    );
    brandList.appendChild(slab);
  }
  host.appendChild(brandList);

  // Style picker — slab list with thumbnails (Phase 4 backend serves them)
  const styles = t.available_styles || [];
  if (styles.length > 0) {
    host.appendChild(el('h3', { class: 'wiz-section-title' }, 'Output Style'));
    const styleList = el('div', { class: 'wiz-slab-list' });
    for (const s of styles) {
      const sel = state.style_id === s.id;
      const thumb = s.thumbnail_url
        ? el('img', { class: 'wiz-slab-thumb', src: s.thumbnail_url, alt: '' })
        : el('div', { class: 'wiz-slab-thumb-empty' }, (s.label || s.id).slice(0, 2).toUpperCase());
      const slab = el('button', {
        class: 'wiz-slab' + (sel ? ' selected' : ''),
        type: 'button',
        onclick: () => { state.style_id = s.id; saveDraft(); renderWizard(); },
      },
        thumb,
        el('div', { class: 'wiz-slab-body' },
          el('div', { class: 'wiz-slab-title' }, s.label || s.id),
          el('div', { class: 'wiz-slab-desc' }, s.description || ''),
        ),
        el('div', { class: 'wiz-slab-state' }, sel ? 'SELECTED' : 'SELECT'),
      );
      styleList.appendChild(slab);
    }
    host.appendChild(styleList);
  }

  // Both selections have defaults preselected (brand_slug from cmd bar,
  // style_id from default_style_id), so Next is enabled on arrival.
  host.appendChild(navRow({
    next: wizardNext,
    nextDisabled: !state.brand_slug || !state.style_id,
    nextLabel: 'INITIATE →',
    hideBack: true,
  }));
}

// ---- Step 2: Required ----
function renderStep2Required(host) {
  const t = state.template;
  const required = t.required_fields || [];

  host.appendChild(el('div', { class: 'wiz-head' },
    el('h2', null, 'Required information'),
    el('p', { class: 'wiz-subtle' }, 'Fill the fields below. They drive the body of your ' + t.label + '.'),
  ));

  const form = el('div', { class: 'wiz-form' });
  for (const f of required) form.appendChild(renderModuleField(f, true));
  host.appendChild(form);

  if (state.validation_general) {
    host.appendChild(el('div', { class: 'wiz-error-banner' }, state.validation_general));
  }

  host.appendChild(navRow({
    back: wizardBack,
    next: () => {
      const errors = validateModuleFields(required, state.fields, true);
      state.validation_errors = errors;
      state.validation_general = Object.keys(errors).length
        ? Object.keys(errors).length + ' required field(s) need attention.'
        : null;
      if (Object.keys(errors).length) { renderWizard(); return; }
      wizardNext();
    },
  }));
}

// ---- Step 3: Optional ----
function renderStep3Optional(host) {
  const t = state.template;
  const optional = t.optional_fields || [];

  host.appendChild(el('div', { class: 'wiz-head' },
    el('h2', null, 'Optional details'),
    el('p', { class: 'wiz-subtle' }, optional.length
      ? "These improve the output but aren't required."
      : 'No optional fields for this deliverable.'),
  ));

  if (optional.length === 0) {
    host.appendChild(navRow({ back: wizardBack, next: wizardNext, nextLabel: 'SKIP →' }));
    return;
  }

  const details = el('details', { class: 'wiz-optional', open: true });
  details.appendChild(el('summary', null, 'Advanced options (' + optional.length + ')'));
  const form = el('div', { class: 'wiz-form' });
  for (const f of optional) form.appendChild(renderModuleField(f, false));
  details.appendChild(form);
  host.appendChild(details);

  host.appendChild(navRow({
    back: wizardBack,
    next: () => {
      const errors = validateModuleFields(optional, state.fields, false);
      state.validation_errors = errors;
      if (Object.keys(errors).length) { renderWizard(); return; }
      wizardNext();
    },
  }));
}

// ---- Step 4: Files ----
function renderStep4Files(host) {
  const t = state.template;
  const prompts = t.file_upload_prompts || [];

  host.appendChild(el('div', { class: 'wiz-head' },
    el('h2', null, 'Files & references'),
    el('p', { class: 'wiz-subtle' },
      'Upload reference materials. Brand guides, photos, prior documents — Apollo reads them when generating your deliverable.'),
  ));

  if (state.uploadError) {
    host.appendChild(el('div', { class: 'wiz-error-banner' }, state.uploadError));
  }

  for (const p of prompts) host.appendChild(renderUploadSlot(p));

  host.appendChild(navRow({
    back: wizardBack,
    next: () => {
      const missing = [];
      for (const p of prompts) {
        if (!p.required) continue;
        const has = (state.uploads || []).some((u) => u.upload_kind === p.kind);
        if (!has) missing.push(p.label || p.kind);
      }
      if (missing.length) {
        state.uploadError = 'Required uploads missing: ' + missing.join(', ');
        renderWizard();
        return;
      }
      state.uploadError = null;
      wizardNext();
    },
  }));
}

function renderUploadSlot(prompt) {
  const accepts = prompt.accepts || (prompt.kind && prompt.kind.includes('photo') ? 'image/*' : '*/*');
  const multiple = !!prompt.multiple;
  const myUploads = (state.uploads || []).filter((u) => u.upload_kind === prompt.kind);

  const slot = el('div', { class: 'wiz-upload-slot' });
  slot.appendChild(el('div', { class: 'wiz-upload-head' },
    el('span', { class: 'wiz-upload-title' }, (prompt.label || prompt.kind).toUpperCase()),
    el('span', { class: 'wiz-upload-meta' },
      (prompt.required ? 'Required' : 'Optional') + (multiple ? ' · Multiple allowed' : ' · One file')
    ),
  ));
  if (prompt.help) slot.appendChild(el('p', { class: 'wiz-upload-help' }, prompt.help));

  const inputId = 'file-input-' + prompt.kind.replace(/[^a-z0-9]/gi, '-');
  const dz = el('label', {
    class: 'wiz-upload-zone',
    for: inputId,
    ondragover: (e) => { e.preventDefault(); dz.classList.add('hot'); },
    ondragleave: () => dz.classList.remove('hot'),
    ondrop: (e) => {
      e.preventDefault();
      dz.classList.remove('hot');
      handleUploadFiles(e.dataTransfer.files, prompt);
    },
  },
    uploadIcon(),
    el('div', { class: 'wiz-upload-cta' }, '+ Drop files here or click to browse'),
  );
  const input = el('input', {
    type: 'file',
    id: inputId,
    accept: accepts,
    multiple,
    style: 'display:none',
    onchange: (e) => handleUploadFiles(e.target.files, prompt),
  });
  slot.appendChild(input);
  slot.appendChild(dz);

  if (myUploads.length > 0) {
    const list = el('div', { class: 'wiz-upload-list' });
    list.appendChild(el('div', { class: 'wiz-upload-list-head' }, 'UPLOADED'));
    for (const u of myUploads) {
      const row = el('div', { class: 'wiz-upload-row' });
      row.appendChild(el('span', { class: 'wiz-upload-icon' },
        u.content_type && u.content_type.startsWith('image/') ? '🖼' :
        u.content_type === 'application/pdf' ? '📄' : '📎'));
      row.appendChild(el('span', { class: 'wiz-upload-name' }, u.original_filename));
      row.appendChild(el('span', { class: 'wiz-upload-size' }, bytesToHuman(u.size_bytes)));
      row.appendChild(el('button', {
        class: 'wiz-upload-remove',
        type: 'button',
        'aria-label': 'Remove ' + u.original_filename,
        onclick: () => removeUpload(u.id),
      }, '✕'));
      list.appendChild(row);
    }
    slot.appendChild(list);
  }

  const pending = (state.pendingUploads || []).filter((p) => p.kind === prompt.kind);
  for (const p of pending) {
    slot.appendChild(el('div', { class: 'wiz-upload-row pending' },
      el('span', { class: 'wiz-upload-icon' }, '⋯'),
      el('span', { class: 'wiz-upload-name' }, p.filename),
      el('span', { class: 'wiz-upload-size' }, 'Uploading…'),
    ));
  }

  return slot;
}

async function handleUploadFiles(fileList, prompt) {
  if (!fileList || fileList.length === 0) return;
  const files = Array.from(fileList);
  for (const file of files) {
    const v = uploads.validateFile(file, { maxBytes: 50 * 1024 * 1024 });
    if (!v.ok) { toast(v.error, { variant: 'error' }); continue; }
    const pendingId = 'pending-' + Math.random().toString(36).slice(2, 8);
    state.pendingUploads.push({ id: pendingId, kind: prompt.kind, filename: file.name });
    renderWizard();
    try {
      const row = await uploads.upload(file, prompt.kind);
      if (row) {
        state.uploads.push(row);
        saveDraft();
      }
    } catch (err) {
      toast('Upload failed: ' + (err && err.message || String(err)), { variant: 'error' });
    } finally {
      state.pendingUploads = state.pendingUploads.filter((p) => p.id !== pendingId);
      renderWizard();
    }
  }
}

async function removeUpload(id) {
  try {
    await uploads.remove(id);
  } catch (err) {
    toast('Could not remove file: ' + (err && err.message || String(err)), { variant: 'error' });
    return;
  }
  state.uploads = state.uploads.filter((u) => u.id !== id);
  saveDraft();
  renderWizard();
}

// ---- Step 5: Review ----
function renderStep5Review(host) {
  const t = state.template;

  host.appendChild(el('div', { class: 'wiz-head' },
    el('h2', null, 'Mission brief'),
    el('p', { class: 'wiz-subtle' }, 'Review everything below, then launch generation.'),
  ));

  const review = el('div', { class: 'wiz-review' });
  review.appendChild(el('h3', null, 'Deliverable'));
  review.appendChild(reviewKv('Type', t.label));
  review.appendChild(reviewKv('Industry', t.industry_label || t.industry_slug));
  const styleObj = (t.available_styles || []).find((s) => s.id === state.style_id);
  review.appendChild(reviewKv('Style', styleObj ? styleObj.label : (state.style_id || '—')));
  review.appendChild(reviewKv('Brand', BRAND_LABELS[state.brand_slug] || state.brand_slug || '—'));

  if ((t.required_fields || []).length) {
    review.appendChild(el('h3', null, 'Required fields'));
    for (const f of t.required_fields) {
      review.appendChild(reviewKv(f.label, formatFieldDisplay(state.fields[f.key])));
    }
  }
  const optionalProvided = (t.optional_fields || []).filter((f) => {
    const v = state.fields[f.key];
    return v != null && (typeof v !== 'string' || v.trim() !== '') && (!Array.isArray(v) || v.length > 0);
  });
  if (optionalProvided.length) {
    review.appendChild(el('h3', null, 'Optional fields'));
    for (const f of optionalProvided) {
      review.appendChild(reviewKv(f.label, formatFieldDisplay(state.fields[f.key])));
    }
  }
  if ((state.uploads || []).length) {
    review.appendChild(el('h3', null, 'Uploaded files (' + state.uploads.length + ')'));
    const ul = el('ul', { class: 'wiz-review-files' });
    for (const u of state.uploads) {
      ul.appendChild(el('li', null,
        el('span', null, u.original_filename),
        el('span', { class: 'wiz-review-files-meta' },
          (u.upload_kind || '').replace(/_/g, ' ') + ' · ' + bytesToHuman(u.size_bytes)),
      ));
    }
    review.appendChild(ul);
  }

  host.appendChild(review);
  host.appendChild(priceLineEl(t));

  host.appendChild(navRow({
    back: wizardBack,
    next: () => { state.step = 6; renderWizard(); submitWizard(); },
    nextLabel: 'LAUNCH MISSION →',
  }));
}

function formatFieldDisplay(v) {
  if (v == null) return '—';
  if (Array.isArray(v)) return v.length === 0 ? '—' : v.join(', ');
  if (typeof v === 'string') return v.trim() === '' ? '—' : v;
  return String(v);
}

// ---- Step 6: Generate ----
function renderStep6Generate(host) {
  const t = state.template;

  if (state.submitting) {
    host.appendChild(el('div', { class: 'wiz-result-wrap' },
      el('div', { class: 'wiz-result-status' }, '◆ MISSION LAUNCHING'),
      el('h2', { class: 'wiz-result-headline' }, t.label),
      el('div', { class: 'wiz-result-meta' },
        missionCodeFor(t) + ' · GENERATING FOR ' +
        (BRAND_LABELS[state.brand_slug] || state.brand_slug || '').toUpperCase()),
    ));
    return;
  }
  if (state.error) {
    host.appendChild(el('div', { class: 'wiz-result-wrap' },
      el('div', { class: 'wiz-result-status failed' }, '◆ MISSION ABORTED'),
      el('h2', { class: 'wiz-result-headline' }, t.label),
      el('div', { class: 'wiz-result-meta' }, missionCodeFor(t)),
      el('div', { class: 'wiz-error-banner' }, state.error),
      el('div', { class: 'wiz-result-actions' },
        el('button', {
          class: 'wiz-btn wiz-btn-primary',
          type: 'button',
          onclick: () => { state.error = null; submitWizard(); },
        }, 'RETRY'),
        el('button', {
          class: 'wiz-btn',
          type: 'button',
          onclick: () => { state.error = null; state.step = 5; renderWizard(); },
        }, '← BACK TO REVIEW'),
      ),
    ));
    return;
  }
  if (state.result) {
    const r = state.result;
    const detailHref = r.submission_id
      ? '/apollo/mission.html?id=' + encodeURIComponent(r.submission_id)
      : null;
    const time = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
    const expiresLabel = r.expires_at
      ? new Date(r.expires_at).toLocaleDateString()
      : 'IN 7 DAYS';
    host.appendChild(el('div', { class: 'wiz-result-wrap' },
      el('div', { class: 'wiz-result-status complete' }, '◆ MISSION COMPLETE'),
      el('h2', { class: 'wiz-result-headline' }, t.label),
      el('div', { class: 'wiz-result-meta' },
        missionCodeFor(t) + ' · GENERATED ' + time + ' · LINK EXPIRES ' + expiresLabel),
      el('div', { class: 'wiz-result-actions' },
        r.download_url
          ? el('a', {
              class: 'wiz-btn wiz-btn-go',
              href: r.download_url,
              target: '_blank',
              rel: 'noopener noreferrer',
            }, 'DOWNLOAD PDF ↓')
          : null,
        detailHref
          ? el('a', { class: 'wiz-btn', href: detailHref }, 'VIEW MISSION')
          : null,
        el('a', { class: 'wiz-btn', href: '/apollo/' }, 'RETURN TO MISSION CONTROL'),
        el('button', {
          class: 'wiz-btn',
          type: 'button',
          onclick: () => {
            state.result = null;
            state.step = 1;
            state.missionCode = null;
            renderWizard();
          },
        }, 'NEW MISSION'),
      ),
    ));
    return;
  }
  // Idle state — review step always kicks off submit, so this is a fallback.
  host.appendChild(el('div', { class: 'wiz-result-wrap' },
    el('div', { class: 'wiz-result-status' }, 'READY TO LAUNCH'),
    el('h2', { class: 'wiz-result-headline' }, t.label),
    el('div', { class: 'wiz-result-actions' },
      el('button', {
        class: 'wiz-btn wiz-btn-primary',
        type: 'button',
        onclick: submitWizard,
      }, 'INITIATE LAUNCH'),
    ),
  ));
}

async function submitWizard() {
  const t = state.template;
  if (!t) return;
  state.submitting = true;
  state.error = null;
  state.result = null;
  document.body.classList.add('generating');
  renderWizard();

  try {
    const body = {
      slug: t.slug,
      brand_slug: state.brand_slug,
      style_id: state.style_id,
      fields: state.fields,
      upload_ids: (state.uploads || []).map((u) => u.id),
    };
    const json = await apiJson('/api/apollo/submit', { method: 'POST', body });
    if (!json || !json.success) throw new Error((json && json.error) || 'Submit failed');
    // Normalize the download URL field (older rows used drive_file_url).
    json.download_url = json.download_url || json.drive_file_url || null;
    state.result = json;
    clearDraftForCurrent();
  } catch (err) {
    state.error = err && err.message ? err.message : String(err);
  } finally {
    state.submitting = false;
    document.body.classList.remove('generating');
    renderWizard();
  }
}

// ---- Field renderer ----
function renderModuleField(f, isRequired) {
  const errMsg = state.validation_errors[f.key];
  const wrap = el('div', { class: 'wiz-field' + (errMsg ? ' has-error' : '') });
  const label = el('label', null,
    f.label,
    isRequired ? el('span', { class: 'wiz-req' }, ' *') : null,
  );
  wrap.appendChild(label);

  const v = state.fields[f.key];
  const setV = (val) => {
    state.fields[f.key] = val;
    if (state.validation_errors[f.key]) delete state.validation_errors[f.key];
    saveDraftDebounced();
  };

  let input;
  if (f.type === 'textarea' || f.type === 'rich_text') {
    input = el('textarea', { rows: 4, placeholder: f.placeholder || '', oninput: (e) => setV(e.target.value) });
    input.value = v != null ? v : '';
  } else if (f.type === 'date') {
    input = el('input', { type: 'date', oninput: (e) => setV(e.target.value) });
    input.value = v != null ? v : '';
  } else if (f.type === 'number') {
    input = el('input', {
      type: 'number',
      placeholder: f.placeholder || '',
      oninput: (e) => setV(e.target.value === '' ? '' : Number(e.target.value)),
    });
    input.value = (v == null || v === '') ? (f.default != null ? f.default : '') : v;
    if (v == null && f.default != null) state.fields[f.key] = f.default;
  } else if (f.type === 'select') {
    input = el('select', { onchange: (e) => setV(e.target.value) });
    input.appendChild(el('option', { value: '' }, '— Select —'));
    for (const opt of (f.options || [])) {
      const o = (typeof opt === 'string') ? { value: opt, label: opt } : opt;
      input.appendChild(el('option', { value: o.value }, o.label));
    }
    input.value = v != null ? v : '';
  } else if (f.type === 'multi_select') {
    const row = el('div', { class: 'wiz-chips' });
    const sel = Array.isArray(v) ? v.slice() : [];
    for (const opt of (f.options || [])) {
      const o = (typeof opt === 'string') ? { value: opt, label: opt } : opt;
      const checked = sel.includes(o.value);
      const chip = el('label', { class: 'wiz-chip' + (checked ? ' on' : '') },
        el('input', {
          type: 'checkbox',
          checked,
          onchange: (e) => {
            if (e.target.checked) { if (!sel.includes(o.value)) sel.push(o.value); }
            else { const i = sel.indexOf(o.value); if (i >= 0) sel.splice(i, 1); }
            setV(sel.slice());
            chip.classList.toggle('on', e.target.checked);
          },
        }),
        o.label,
      );
      row.appendChild(chip);
    }
    wrap.appendChild(row);
    if (errMsg) wrap.appendChild(el('div', { class: 'wiz-inline-err' }, errMsg));
    else if (f.help) wrap.appendChild(el('div', { class: 'wiz-help' }, f.help));
    return wrap;
  } else {
    input = el('input', { type: 'text', placeholder: f.placeholder || '', oninput: (e) => setV(e.target.value) });
    input.value = v != null ? v : '';
  }
  wrap.appendChild(input);
  if (errMsg) wrap.appendChild(el('div', { class: 'wiz-inline-err' }, errMsg));
  else if (f.help) wrap.appendChild(el('div', { class: 'wiz-help' }, f.help));
  return wrap;
}

function validateModuleFields(fields, values, requireAll) {
  const errors = {};
  for (const f of fields) {
    const v = values[f.key];
    if (requireAll) {
      if (v == null || (typeof v === 'string' && v.trim() === '') || (Array.isArray(v) && v.length === 0)) {
        errors[f.key] = 'Required.';
        continue;
      }
    }
    if (f.type === 'date' && v) {
      if (!/^\d{4}-\d{2}-\d{2}$/.test(String(v))) errors[f.key] = 'Use YYYY-MM-DD.';
    }
    if (f.type === 'number' && v !== '' && v != null) {
      if (!Number.isFinite(Number(v))) errors[f.key] = 'Must be a number.';
    }
  }
  return errors;
}

function reviewKv(k, v) {
  return el('div', { class: 'wiz-review-row' },
    el('div', { class: 'wiz-review-k' }, k),
    el('div', { class: 'wiz-review-v' }, v),
  );
}

function navRow(opts) {
  const o = opts || {};
  const row = el('div', { class: 'wiz-nav' });
  if (o.hideBack) {
    // Spacer to push the next button to the right via space-between
    row.appendChild(el('div'));
  } else {
    row.appendChild(el('button', {
      class: 'wiz-btn',
      type: 'button',
      onclick: o.back || (() => {}),
    }, '← ABORT'));
  }
  row.appendChild(el('button', {
    class: 'wiz-btn wiz-btn-primary',
    type: 'button',
    onclick: o.next || (() => {}),
    disabled: !!o.nextDisabled,
  }, o.nextLabel || 'PROCEED →'));
  return row;
}
