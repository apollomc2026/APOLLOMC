<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Apollo Mission Control</title>

<link rel="manifest" href="/apollo/manifest.json">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Apollo">
<link rel="apple-touch-icon" sizes="192x192" href="/apollo/icons/icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="/apollo/icons/icon-512.png">
<link rel="icon" type="image/png" sizes="192x192" href="/apollo/icons/icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0a0a0f;
    --bg-rad: radial-gradient(ellipse at center, rgba(20,30,60,0.2) 0%, rgba(10,10,15,1) 100%);
    --text: #ffffff;
    --text-2: rgba(255,255,255,0.8);
    --text-3: rgba(255,255,255,0.6);
    --text-4: rgba(255,255,255,0.4);
    --cyan: #6be3ff;
    --cyan-dim: rgba(107,227,255,0.6);
    --blue: #4a9eff;
    --orange: #ff7a00;
    --green: #7bff9f;
    --border: rgba(107,227,255,0.2);
    --border-strong: #6be3ff;
    --card-bg: rgba(10,10,15,0.75);
    --header-bg: rgba(10,10,15,0.95);
    --alert-bg: linear-gradient(135deg, rgba(107,227,255,0.15), rgba(255,122,0,0.15));
    --input-bg: rgba(0,0,0,0.3);
    --input-border: rgba(107,227,255,0.3);
    --radius: 16px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: var(--bg-rad);
    pointer-events: none;
    z-index: -3; /* below cosmic-sunburst (-2) and watermarks (-1) */
  }
  body > * { position: relative; z-index: 1; }

  button { font-family: inherit; color: inherit; }
  a { color: var(--cyan); text-decoration: none; }
  a:hover { opacity: 0.85; }

  /* Warp speed background */
  .warp-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }
  .warp-line {
    position: absolute;
    height: 1px;
    width: 100%;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity: 0.2;
    animation: warpSpeed 3s linear infinite;
  }
  @keyframes warpSpeed {
    0%   { transform: translateX(-100%) scaleX(0); opacity: 0; }
    10%  { transform: translateX(-100%) scaleX(1); opacity: 1; }
    90%  { transform: translateX(100%)  scaleX(1); opacity: 1; }
    100% { transform: translateX(100%)  scaleX(0); opacity: 0; }
  }
  body.generating .warp-line { opacity: 0.5; animation-duration: 1.4s; }

  /* Header */
  header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 50;
    background: var(--header-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--text);
  }
  .logo img { height: 32px; width: auto; display: block; }
  .logo span {
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.3px;
  }

  /* User menu */
  .user-menu { position: relative; }
  .user-menu-trigger {
    display: flex;
    align-items: center;
    gap: 10px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 4px 14px 4px 4px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .user-menu-trigger:hover { border-color: var(--cyan); }
  .user-menu-trigger .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #1a1a2a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--cyan);
    overflow: hidden;
  }
  .user-menu-trigger .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .user-menu-trigger .user-name {
    font-size: 14px;
    font-weight: 500;
    max-width: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .user-menu-trigger .chevron { color: var(--text-3); font-size: 10px; }
  .user-menu-dropdown {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    min-width: 240px;
    background: rgba(10,10,15,0.98);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }
  .user-menu-email {
    font-size: 13px;
    color: var(--text-3);
    padding: 6px 10px 10px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
    word-break: break-all;
  }
  .signout-btn {
    width: 100%;
    background: transparent;
    border: none;
    text-align: left;
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text-2);
    transition: all 0.15s ease;
  }
  .signout-btn:hover { background: rgba(255,122,0,0.1); color: var(--orange); }

  /* Main layout */
  main {
    padding: 92px 24px 48px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Buttons */
  .btn {
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.3px;
    border: none;
    cursor: pointer;
    border-radius: var(--radius-sm);
    transition: all 0.3s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn[disabled] { opacity: 0.4; cursor: not-allowed; }
  .btn-primary {
    background: linear-gradient(135deg, var(--cyan), var(--blue));
    color: #000;
    padding: 14px 28px;
  }
  .btn-primary:not([disabled]):hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(107,227,255,0.3);
  }
  .btn-primary:not([disabled]):active { transform: translateY(0); }
  .btn-secondary {
    background: transparent;
    color: var(--cyan);
    border: 2px solid var(--cyan);
    padding: 12px 24px;
  }
  .btn-secondary:not([disabled]):hover { background: var(--cyan); color: #000; }
  .btn-sm { padding: 10px 18px; font-size: 14px; }
  .btn-lg { padding: 16px 40px; font-size: 16px; min-width: 320px; }

  /* Centered card (signed-out, not-authorized, loading) */
  .auth-card {
    max-width: 520px;
    margin: auto;
    padding: 48px 40px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 24px;
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    text-align: center;
  }
  .auth-card .logo-large {
    height: 64px;
    margin-bottom: 24px;
  }
  .auth-card h1 {
    margin: 0 0 12px 0;
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #ffffff, var(--cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .auth-card p.subtitle {
    margin: 0 0 28px 0;
    color: var(--text-3);
    font-size: 15px;
  }
  .auth-card .google-cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .auth-card .google-cta svg { width: 20px; height: 20px; }
  .auth-card .footer-note {
    margin-top: 24px;
    font-size: 12px;
    color: var(--text-4);
    letter-spacing: 0.3px;
  }
  .auth-card .email-callout {
    background: rgba(255,122,0,0.08);
    border: 1px solid rgba(255,122,0,0.3);
    border-radius: 12px;
    padding: 14px 18px;
    margin: 12px 0 24px 0;
    color: var(--text-2);
    font-size: 13px;
  }
  .auth-card .email-callout strong { color: var(--orange); word-break: break-all; }

  .connect-pulse {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--cyan);
    margin: 20px auto 12px;
    box-shadow: 0 0 0 0 rgba(107,227,255,0.7);
    animation: pulse 1.5s ease-out infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(107,227,255,0.6); }
    100% { box-shadow: 0 0 0 24px rgba(107,227,255,0); }
  }
  .connect-text {
    color: var(--text-3);
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  /* Intake shell */
  .intake {
    max-width: 960px;
    margin: 0 auto;
    width: 100%;
  }

  /* Step indicator */
  .steps {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 4px;
    max-width: 820px;
    margin: 0 auto 40px;
  }
  .step {
    display: flex;
    align-items: center;
    flex: 0 0 auto;
  }
  .step-circle {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 13px;
    color: var(--text-3);
    transition: all 0.3s ease;
    background: var(--bg);
  }
  .step.active .step-circle {
    border-color: var(--cyan);
    color: var(--cyan);
    box-shadow: 0 0 20px rgba(107,227,255,0.4);
  }
  .step.done .step-circle {
    background: var(--cyan);
    border-color: var(--cyan);
    color: #000;
  }
  .step-label {
    margin-left: 10px;
    font-size: 13px;
    color: var(--text-3);
    font-weight: 500;
  }
  .step.active .step-label { color: var(--cyan); }
  .step.done .step-label { color: var(--text-2); }
  .step-line {
    flex: 1 1 auto;
    height: 2px;
    background: rgba(255,255,255,0.08);
    margin: 0 4px;
  }
  .step.done + .step-line { background: var(--cyan-dim); }

  @media (max-width: 780px) {
    .step-label { display: none; }
    .steps { max-width: 460px; }
  }

  /* Step content */
  .step-head {
    text-align: center;
    margin-bottom: 32px;
  }
  .step-head h2 {
    margin: 0 0 8px 0;
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #ffffff, var(--cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .step-head p {
    margin: 0;
    color: var(--text-3);
    font-size: 15px;
  }

  /* Card grids */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  @media (max-width: 900px) { .card-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px) { .card-grid { grid-template-columns: 1fr; } }
  .grid-brands { grid-template-columns: repeat(3, 1fr); }
  @media (max-width: 900px) { .grid-brands { grid-template-columns: repeat(2, 1fr); } }

  .select-card {
    background: var(--card-bg);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
    cursor: pointer;
    text-align: left;
    transition: all 0.3s ease;
    position: relative;
    font-family: inherit;
    color: inherit;
    font-size: inherit;
  }
  .select-card:hover {
    border-color: var(--cyan);
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(107,227,255,0.15);
  }
  .select-card.selected {
    border-color: var(--cyan);
    background: linear-gradient(135deg, rgba(107,227,255,0.12), rgba(74,158,255,0.05));
  }
  .select-card .card-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 6px;
    color: var(--text);
  }
  .select-card .card-desc {
    font-size: 13px;
    color: var(--text-3);
    line-height: 1.4;
  }
  .select-card .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
    font-size: 11px;
    color: var(--text-3);
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: rgba(107,227,255,0.14);
    color: var(--cyan);
  }
  .pill-orange { background: rgba(255,122,0,0.14); color: var(--orange); }
  .pill-green  { background: rgba(123,255,159,0.14); color: var(--green); }
  .select-card .check {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--cyan);
    color: #000;
    display: none;
    align-items: center;
    justify-content: center;
    font-weight: 800;
  }
  .select-card.selected .check { display: flex; }

  /* Brand card */
  .brand-card {
    background: var(--card-bg);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
    cursor: pointer;
    text-align: center;
    min-height: 160px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    transition: all 0.3s ease;
    position: relative;
    font-family: inherit;
    color: inherit;
    font-size: inherit;
  }
  .brand-card:hover {
    border-color: var(--cyan);
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(107,227,255,0.15);
  }
  .brand-card.selected {
    border-color: var(--cyan);
    background: linear-gradient(135deg, rgba(107,227,255,0.12), rgba(74,158,255,0.05));
  }
  .brand-card img {
    max-width: 150px;
    max-height: 56px;
    object-fit: contain;
    filter: brightness(1.1);
  }
  .brand-card .brand-ph {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: rgba(107,227,255,0.1);
    border: 1px solid var(--border);
    color: var(--cyan);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 700;
  }
  .brand-card .brand-name {
    font-weight: 600;
    font-size: 15px;
  }
  .brand-card .brand-note {
    font-size: 11px;
    color: var(--text-4);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .brand-card .check {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--cyan);
    color: #000;
    display: none;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 13px;
  }
  .brand-card.selected .check { display: flex; }

  /* Form */
  .form { display: grid; gap: 20px; max-width: 720px; margin: 0 auto; }
  .field label {
    display: block;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 6px;
    color: var(--text-2);
  }
  .field label .req { color: var(--orange); }
  .field input[type="text"],
  .field input[type="number"],
  .field input[type="date"],
  .field textarea,
  .field select {
    width: 100%;
    padding: 12px 16px;
    font-size: 15px;
    font-family: inherit;
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: var(--radius-sm);
    color: var(--text);
    transition: all 0.2s ease;
  }
  .field textarea { min-height: 96px; resize: vertical; line-height: 1.5; }
  .field input::placeholder, .field textarea::placeholder { color: var(--text-4); }
  .field input:focus, .field textarea:focus, .field select:focus {
    outline: none;
    border-color: var(--cyan);
    box-shadow: 0 0 0 3px rgba(107,227,255,0.15);
  }
  .field.missing input,
  .field.missing textarea,
  .field.missing select { border-color: var(--orange); }
  .field .help { font-size: 12px; color: var(--text-4); margin-top: 4px; }
  .field .inline-err { font-size: 12px; color: var(--orange); margin-top: 4px; }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid var(--input-border);
    background: var(--input-bg);
    color: var(--text-2);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .chip input { margin: 0; }
  .chip.on { border-color: var(--cyan); background: rgba(107,227,255,0.1); color: var(--cyan); }

  /* Drop zone */
  .drop-zone {
    display: block;
    border: 2px dashed var(--input-border);
    border-radius: var(--radius);
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    background: rgba(107,227,255,0.04);
    transition: all 0.25s ease;
  }
  .drop-zone.hot { border-color: var(--cyan); background: rgba(107,227,255,0.1); }
  .drop-zone svg { width: 40px; height: 40px; color: var(--cyan); margin-bottom: 10px; }
  .drop-zone .dz-headline { font-weight: 600; color: var(--text); }
  .drop-zone .dz-sub { font-size: 12px; color: var(--text-3); margin-top: 4px; }
  .thumb-grid {
    margin-top: 16px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
  }
  .thumb {
    position: relative;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px;
    background: var(--input-bg);
  }
  .thumb img {
    width: 100%;
    height: 90px;
    object-fit: cover;
    border-radius: 4px;
  }
  .thumb .fname {
    font-size: 11px;
    margin-top: 6px;
    color: var(--text-3);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .thumb .remove {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 22px;
    height: 22px;
    border-radius: 11px;
    background: rgba(0,0,0,0.65);
    color: #fff;
    border: 1px solid var(--border);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 0;
  }

  /* Review */
  .review {
    background: var(--alert-bg);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border: 1px solid var(--cyan);
    border-radius: var(--radius);
    padding: 24px;
    max-width: 720px;
    margin: 0 auto;
  }
  .review h3 {
    margin: 0 0 12px 0;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--cyan);
  }
  .review-row {
    display: flex;
    gap: 12px;
    padding: 8px 0;
    font-size: 14px;
    border-bottom: 1px solid rgba(107,227,255,0.1);
  }
  .review-row:last-child { border-bottom: none; }
  .review-row .k {
    flex: 0 0 160px;
    color: var(--text-3);
    font-size: 13px;
  }
  .review-row .v {
    flex: 1 1 auto;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }
  @media (max-width: 600px) {
    .review-row { flex-direction: column; gap: 2px; }
    .review-row .k { flex: none; }
  }

  /* Style options (advanced) — collapsible block under Mission review */
  .style-options {
    margin-top: 24px;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px 18px;
    background: var(--bg-2);
    max-width: 960px;
    margin-left: auto;
    margin-right: auto;
  }
  .style-options summary {
    cursor: pointer;
    color: var(--accent);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    list-style: none;
    user-select: none;
  }
  .style-options summary::marker,
  .style-options summary::-webkit-details-marker { display: none; }
  .style-options summary::after {
    content: '+';
    float: right;
    color: var(--text-3);
    font-size: 16px;
    font-weight: 300;
  }
  .style-options[open] summary::after { content: '−'; }
  .style-options[open] { padding-bottom: 18px; }
  .so-label {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 16px;
  }
  .so-label-text {
    font-size: 12px;
    color: var(--text-3);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .so-select {
    background: var(--bg-1);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 14px;
    font-family: inherit;
  }
  .so-select:focus {
    outline: none;
    border-color: var(--accent);
  }
  .so-desc {
    font-size: 12px;
    color: var(--text-3);
    line-height: 1.4;
  }

  /* Nav row */
  .nav-row {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-top: 36px;
    max-width: 960px;
    margin-left: auto;
    margin-right: auto;
  }
  .nav-row .spacer { flex: 1 1 auto; }

  /* Result */
  .result-wrap {
    max-width: 520px;
    margin: 40px auto 0;
    text-align: center;
  }
  .result-wrap .launch-icon {
    width: 80px;
    height: 80px;
    margin: 0 auto 24px;
    color: var(--cyan);
  }
  .result-wrap .launching {
    animation: launch 1.4s ease-in-out infinite;
  }
  @keyframes launch {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-10px); }
  }
  .result-wrap h2 {
    margin: 0 0 8px 0;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.3px;
    background: linear-gradient(135deg, #ffffff, var(--cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .result-wrap p.sub {
    margin: 0 0 28px 0;
    color: var(--text-3);
    font-size: 14px;
  }
  .checkmark {
    width: 72px;
    height: 72px;
    margin: 0 auto 20px;
  }
  .checkmark circle {
    stroke: var(--cyan);
    stroke-width: 3;
    stroke-dasharray: 180;
    stroke-dashoffset: 180;
    fill: rgba(107,227,255,0.08);
    animation: drawCircle 0.5s ease forwards;
  }
  .checkmark path {
    stroke: var(--cyan);
    stroke-width: 4;
    stroke-dasharray: 40;
    stroke-dashoffset: 40;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    animation: drawCheck 0.4s 0.3s ease forwards;
  }
  @keyframes drawCircle { to { stroke-dashoffset: 0; } }
  @keyframes drawCheck  { to { stroke-dashoffset: 0; } }
  .result-wrap .expiry {
    margin-top: 14px;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-4);
  }
  .result-wrap .result-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 10px;
  }
  .err-card {
    background: rgba(255,122,0,0.08);
    border: 1px solid rgba(255,122,0,0.4);
    border-radius: var(--radius);
    padding: 24px;
  }
  .err-card .err-title {
    color: var(--orange);
    font-weight: 700;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-size: 13px;
  }
  .err-card pre {
    margin: 0;
    color: var(--text-2);
    font-family: ui-monospace, 'SF Mono', Monaco, monospace;
    font-size: 12px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Toast */
  .toast {
    position: fixed;
    top: 84px;
    right: 24px;
    background: rgba(10,10,15,0.98);
    border: 1px solid rgba(255,122,0,0.5);
    color: var(--text);
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 13px;
    z-index: 200;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    max-width: 360px;
  }

  .hidden { display: none !important; }

  /* ════════════════════════════════════════════════════════════
     Cosmic depth layer — sunburst + wordmark + planet watermark
     All purely decorative. z-index < 0, aria-hidden, pointer-events:none.
     ════════════════════════════════════════════════════════════ */

  .cosmic-sunburst {
    position: fixed;
    top: -20vh;
    right: -15vw;
    width: 90vw;
    height: 90vw;
    max-width: 1400px;
    max-height: 1400px;
    pointer-events: none;
    z-index: -2;
    opacity: 0.8;
  }
  .sunburst-glow {
    position: absolute;
    inset: 0;
    background: radial-gradient(
      circle at center,
      rgba(255, 122, 0, 0.22) 0%,
      rgba(255, 122, 0, 0.14) 15%,
      rgba(255, 122, 0, 0.06) 35%,
      rgba(255, 122, 0, 0.02) 55%,
      transparent 75%
    );
    filter: blur(40px);
    animation: sunburstBreathe 14s ease-in-out infinite;
  }
  .sunburst-rays {
    position: absolute;
    inset: 0;
    background: conic-gradient(
      from 0deg at center,
      transparent 0deg,
      rgba(255, 122, 0, 0.04) 4deg,
      transparent 8deg,
      transparent 30deg,
      rgba(255, 122, 0, 0.03) 34deg,
      transparent 38deg,
      transparent 60deg,
      rgba(255, 122, 0, 0.04) 64deg,
      transparent 68deg,
      transparent 90deg,
      rgba(255, 122, 0, 0.03) 94deg,
      transparent 98deg,
      transparent 120deg,
      rgba(255, 122, 0, 0.04) 124deg,
      transparent 128deg,
      transparent 150deg,
      rgba(255, 122, 0, 0.03) 154deg,
      transparent 158deg,
      transparent 180deg,
      rgba(255, 122, 0, 0.04) 184deg,
      transparent 188deg,
      transparent 210deg,
      rgba(255, 122, 0, 0.03) 214deg,
      transparent 218deg,
      transparent 240deg,
      rgba(255, 122, 0, 0.04) 244deg,
      transparent 248deg,
      transparent 270deg,
      rgba(255, 122, 0, 0.03) 274deg,
      transparent 278deg,
      transparent 300deg,
      rgba(255, 122, 0, 0.04) 304deg,
      transparent 308deg,
      transparent 330deg,
      rgba(255, 122, 0, 0.03) 334deg,
      transparent 338deg,
      transparent 360deg
    );
    filter: blur(8px);
    animation: sunburstRotate 90s linear infinite;
  }
  @keyframes sunburstBreathe {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.7; transform: scale(1.05); }
  }
  @keyframes sunburstRotate {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @media (max-width: 640px) {
    .cosmic-sunburst {
      top: -30vh;
      right: -40vw;
      width: 140vw;
      height: 140vw;
      opacity: 0.6;
    }
  }

  .wordmark-watermark {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    font-size: clamp(12rem, 22vw, 28rem);
    letter-spacing: 0.15em;
    color: #ff7a00;
    opacity: 0.06;
    white-space: nowrap;
    pointer-events: none;
    z-index: -1;
    user-select: none;
    text-shadow: 0 0 60px rgba(255, 122, 0, 0.3);
  }
  @media (max-width: 640px) {
    .wordmark-watermark {
      font-size: 9rem;
      opacity: 0.05;
      letter-spacing: 0.08em;
    }
  }

  .logo-watermark {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) translateY(10vh);
    pointer-events: none;
    z-index: -1;
    opacity: 0.05;
  }
  .apollo-planet-large {
    position: relative;
    width: 50vh;
    height: 50vh;
    max-width: 500px;
    max-height: 500px;
    background: radial-gradient(circle at 30% 30%, #87ceeb, #4a9eff, #2c5aa0);
    border-radius: 50%;
    box-shadow:
      0 0 100px rgba(74, 158, 255, 0.5),
      inset -24px -24px 60px rgba(0, 0, 0, 0.3);
  }
  .apollo-planet-large::before {
    content: '';
    position: absolute;
    top: -12%;
    left: -12%;
    width: 124%;
    height: 124%;
    border: 4px dashed #ff7a00;
    border-radius: 50%;
    animation: orbitRotateLarge 120s linear infinite;
  }
  @keyframes orbitRotateLarge {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  .apollo-rocket-large {
    position: absolute;
    top: -10%;
    right: -2%;
    width: 0;
    height: 0;
    border-left: 2vh solid transparent;
    border-right: 2vh solid transparent;
    border-bottom: 6vh solid #fff;
    filter: drop-shadow(0 0 12px #6be3ff);
    transform: rotate(-15deg);
  }
  @media (max-width: 640px) {
    .logo-watermark { opacity: 0.04; }
    .apollo-planet-large { width: 60vw; height: 60vw; }
  }

  @media (prefers-reduced-motion: reduce) {
    .sunburst-glow,
    .sunburst-rays,
    .apollo-planet-large::before { animation: none; }
  }
</style>
</head>
<body>

<div class="cosmic-sunburst" aria-hidden="true">
  <div class="sunburst-glow"></div>
  <div class="sunburst-rays"></div>
</div>
<div class="wordmark-watermark" aria-hidden="true">APOLLO</div>
<div class="logo-watermark" aria-hidden="true">
  <div class="apollo-planet-large">
    <div class="apollo-rocket-large"></div>
  </div>
</div>

<div class="warp-container" aria-hidden="true">
  <div class="warp-lines" id="warpLines"></div>
</div>

<header>
  <a href="/apollo/" class="logo">
    <img src="/apollo/logo.png" alt="" onerror="this.style.display='none'">
    <span>Apollo</span>
  </a>
  <div id="userMenu"></div>
</header>

<main id="mainContent"></main>

<div id="toastHost"></div>

<script>
(() => {
  'use strict';

  const API = 'https://portal.apollomc.ai';
  const STEPS = [
    { key: 'template', label: 'Template' },
    { key: 'brand',    label: 'Brand'    },
    { key: 'details',  label: 'Details'  },
    { key: 'images',   label: 'Images'   },
    { key: 'review',   label: 'Review'   },
    { key: 'result',   label: 'Result'   },
  ];

  // ---- State ----
  const state = {
    view: 'loading', // loading | signed-out | not-authorized | intake
    user: null,      // { email, name, avatar }
    step: 1,         // 1..6
    templates: [],
    brands: [],
    brandLogos: new Map(), // slug -> objectURL
    selectedTemplate: null, // replaced with full (fields+sections+notes) on advance
    fullTemplateCache: new Map(), // slug -> full template JSON
    loadingTemplate: false,
    selectedBrand: null,
    formValues: {},
    missingIds: [],
    images: [],
    submitting: false,
    submitResult: null, // { download_url, expires_at, submission_id, file_format, file_size_bytes }
    submitError: null,
    // Style options (Phase 6 — PDF pipeline). Populated from the font-preset
    // + logo-placement endpoints during bootstrap. Form selections live on
    // `selectedFontPreset` + `selectedLogoPlacement`; if not set, the server
    // applies sensible defaults.
    fontPresets: [],
    logoPlacements: [],
    selectedFontPreset: 'editorial',
    selectedLogoPlacement: 'cover-plus-header',
  };

  // ---- DOM helpers ----
  const $ = (sel) => document.querySelector(sel);
  const el = (tag, attrs, ...kids) => {
    const n = document.createElement(tag);
    if (attrs) {
      for (const [k, v] of Object.entries(attrs)) {
        if (v == null || v === false) continue;
        if (k === 'class') n.className = v;
        else if (k === 'style') n.setAttribute('style', v);
        else if (k.startsWith('on') && typeof v === 'function') n.addEventListener(k.slice(2), v);
        else if (v === true) n.setAttribute(k, '');
        else n.setAttribute(k, v);
      }
    }
    for (const kid of kids) {
      if (kid == null || kid === false) continue;
      if (Array.isArray(kid)) kid.forEach((k) => k != null && k !== false && n.appendChild(typeof k === 'string' ? document.createTextNode(k) : k));
      else if (typeof kid === 'string') n.appendChild(document.createTextNode(kid));
      else n.appendChild(kid);
    }
    return n;
  };

  function toast(msg) {
    const t = el('div', { class: 'toast' }, msg);
    $('#toastHost').appendChild(t);
    setTimeout(() => t.remove(), 4500);
  }

  // ---- API ----
  async function api(path, init = {}) {
    const res = await fetch(API + path, {
      credentials: 'include',
      ...init,
      headers: { ...(init.headers || {}) },
    });
    return res;
  }
  async function getJson(path) {
    const r = await api(path);
    if (r.status === 401) { state.view = 'signed-out'; render(); throw new Error('AUTH'); }
    if (r.status === 403) { state.view = 'not-authorized'; render(); throw new Error('FORBIDDEN'); }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  }

  // ---- Warp speed background ----
  function renderWarpLines() {
    const host = $('#warpLines');
    host.innerHTML = '';
    for (let i = 0; i < 8; i++) {
      const line = el('div', { class: 'warp-line' });
      line.style.top = Math.floor(Math.random() * 100) + '%';
      line.style.animationDelay = (Math.random() * 3).toFixed(2) + 's';
      host.appendChild(line);
    }
  }

  // ---- Header user menu ----
  function renderUserMenu() {
    const host = $('#userMenu');
    host.innerHTML = '';
    if (state.view !== 'intake' || !state.user) return;

    const initials = (state.user.name || state.user.email || '?')
      .split(/\s+/).map(s => s[0]).filter(Boolean).slice(0, 2).join('').toUpperCase();

    const avatar = state.user.avatar
      ? el('div', { class: 'avatar' }, el('img', { src: state.user.avatar, alt: '', referrerpolicy: 'no-referrer' }))
      : el('div', { class: 'avatar' }, initials || 'A');

    const firstName = (state.user.name || state.user.email).split(/[\s@]/)[0];

    const trigger = el('button', {
      class: 'user-menu-trigger',
      'aria-expanded': 'false',
      onclick: (e) => { e.stopPropagation(); toggleDropdown(); },
    },
      avatar,
      el('span', { class: 'user-name' }, firstName),
      el('span', { class: 'chevron' }, '▾'),
    );

    const dropdown = el('div', { class: 'user-menu-dropdown hidden', id: 'dropdown' },
      el('div', { class: 'user-menu-email' }, state.user.email),
      el('button', { class: 'signout-btn', onclick: signOut }, 'Sign out'),
    );

    const wrap = el('div', { class: 'user-menu' }, trigger, dropdown);
    host.appendChild(wrap);
  }

  function toggleDropdown(forceClose) {
    const dd = document.getElementById('dropdown');
    if (!dd) return;
    const trig = document.querySelector('.user-menu-trigger');
    if (forceClose || !dd.classList.contains('hidden')) {
      dd.classList.add('hidden');
      if (trig) trig.setAttribute('aria-expanded', 'false');
    } else {
      dd.classList.remove('hidden');
      if (trig) trig.setAttribute('aria-expanded', 'true');
    }
  }
  document.addEventListener('click', (e) => {
    const inside = e.target.closest('.user-menu');
    if (!inside) toggleDropdown(true);
  });

  async function signOut() {
    try {
      await fetch(API + '/api/apollo/auth/signout', { method: 'POST', credentials: 'include' });
    } catch {}
    window.location.reload();
  }

  // ---- Bootstrap ----
  async function bootstrap() {
    renderWarpLines();
    try {
      const r = await fetch(API + '/api/apollo/auth/me', { credentials: 'include' });
      if (!r.ok) throw new Error('auth/me HTTP ' + r.status);
      const data = await r.json();
      if (!data.authenticated) {
        state.view = 'signed-out';
      } else if (!data.authorized) {
        state.user = { email: data.email, name: data.name, avatar: data.avatar };
        state.view = 'not-authorized';
      } else {
        state.user = { email: data.email, name: data.name, avatar: data.avatar };
        state.view = 'intake';
        state.step = 1;
        await loadTemplates();
        await loadBrands();
        await loadStyleOptions();
      }
    } catch (err) {
      state.view = 'signed-out';
    }
    render();
  }

  async function loadTemplates() {
    try {
      const d = await getJson('/api/apollo/templates');
      state.templates = d.templates || [];
    } catch {}
  }
  async function loadBrands() {
    try {
      const d = await getJson('/api/apollo/brands');
      state.brands = d.brands || [];
    } catch {}
  }
  async function loadStyleOptions() {
    try {
      const [p, l] = await Promise.all([
        getJson('/api/apollo/font-presets').catch(() => ({ presets: [] })),
        getJson('/api/apollo/logo-placements').catch(() => ({ placements: [] })),
      ]);
      state.fontPresets = p.presets || [];
      state.logoPlacements = l.placements || [];
    } catch {}
  }

  // ---- Render dispatcher ----
  function render() {
    renderUserMenu();
    const main = $('#mainContent');
    main.innerHTML = '';
    if (state.view === 'loading') return renderLoading(main);
    if (state.view === 'signed-out') return renderSignedOut(main);
    if (state.view === 'not-authorized') return renderNotAuthorized(main);
    if (state.view === 'intake') return renderIntake(main);
  }

  function renderLoading(main) {
    main.appendChild(el('div', { class: 'auth-card' },
      el('img', { class: 'logo-large', src: '/apollo/logo.png', alt: 'Apollo', onerror: "this.style.display='none'" }),
      el('div', { class: 'connect-pulse' }),
      el('div', { class: 'connect-text' }, 'Establishing connection'),
    ));
  }

  function renderSignedOut(main) {
    main.appendChild(el('div', { class: 'auth-card' },
      el('img', { class: 'logo-large', src: '/apollo/logo.png', alt: 'Apollo', onerror: "this.style.display='none'" }),
      el('h1', null, 'Apollo Mission Control'),
      el('p', { class: 'subtitle' }, 'Deliverables generation. Invite-only access.'),
      el('a', {
        class: 'btn btn-primary google-cta',
        href: API + '/api/apollo/auth/signin',
      },
        googleIcon(),
        'Sign in with Google',
      ),
      el('div', { class: 'footer-note' }, 'Access is email-whitelisted. Contact Jon for an invite.'),
    ));
  }

  function googleIcon() {
    const ns = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('viewBox', '0 0 24 24');
    const paths = [
      ['M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z', '#4285F4'],
      ['M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z', '#34A853'],
      ['M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18a11 11 0 0 0 0 9.86l3.66-2.84z', '#FBBC05'],
      ['M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38z', '#EA4335'],
    ];
    for (const [d, fill] of paths) {
      const p = document.createElementNS(ns, 'path');
      p.setAttribute('d', d);
      p.setAttribute('fill', fill);
      svg.appendChild(p);
    }
    return svg;
  }

  function renderNotAuthorized(main) {
    main.appendChild(el('div', { class: 'auth-card' },
      el('img', { class: 'logo-large', src: '/apollo/logo.png', alt: 'Apollo', onerror: "this.style.display='none'" }),
      el('h1', null, 'Access denied'),
      el('p', { class: 'subtitle' }, 'This email is not on the Apollo access list.'),
      el('div', { class: 'email-callout' },
        'Signed in as ',
        el('strong', null, state.user?.email || '(unknown)'),
      ),
      el('button', {
        class: 'btn btn-secondary',
        onclick: signOut,
      }, 'Sign out'),
      el('div', { class: 'footer-note' }, 'Contact Jon to request access.'),
    ));
  }

  // ---- Intake ----
  function currentSteps() {
    // Skip images step if template doesn't support it
    const supports = !!state.selectedTemplate?.supports_images;
    return supports ? STEPS : STEPS.filter(s => s.key !== 'images');
  }

  function stepIndexFor(stateStep) {
    // stateStep is 1..6 against STEPS, but effective visible index depends on supports_images.
    const eff = currentSteps();
    const stepKey = STEPS[stateStep - 1]?.key;
    if (!stepKey) return 0;
    const i = eff.findIndex(s => s.key === stepKey);
    return i === -1 ? 0 : i;
  }

  function nextStep() {
    const supports = !!state.selectedTemplate?.supports_images;
    if (state.step === 3 && !supports) { state.step = 5; return; }
    state.step = Math.min(6, state.step + 1);
  }
  function prevStep() {
    const supports = !!state.selectedTemplate?.supports_images;
    if (state.step === 5 && !supports) { state.step = 3; return; }
    state.step = Math.max(1, state.step - 1);
  }

  function renderIntake(main) {
    const wrap = el('div', { class: 'intake' });
    wrap.appendChild(renderSteps());
    const contentHost = el('div', { id: 'stepHost' });
    wrap.appendChild(contentHost);
    main.appendChild(wrap);

    if (state.step === 1) renderStepTemplate(contentHost);
    else if (state.step === 2) renderStepBrand(contentHost);
    else if (state.step === 3) renderStepDetails(contentHost);
    else if (state.step === 4) renderStepImages(contentHost);
    else if (state.step === 5) renderStepReview(contentHost);
    else if (state.step === 6) renderStepResult(contentHost);
  }

  function renderSteps() {
    const eff = currentSteps();
    const iCurrent = stepIndexFor(state.step);
    const bar = el('div', { class: 'steps' });
    eff.forEach((s, i) => {
      const st = i < iCurrent ? 'done' : (i === iCurrent ? 'active' : '');
      const marker = st === 'done' ? '✓' : String(i + 1);
      bar.appendChild(el('div', { class: 'step ' + st },
        el('div', { class: 'step-circle' }, marker),
        el('span', { class: 'step-label' }, s.label),
      ));
      if (i < eff.length - 1) {
        bar.appendChild(el('div', { class: 'step-line' + (i < iCurrent ? ' done' : '') }));
      }
    });
    return bar;
  }

  // ---- Step 1: template ----
  function categoryPillClass(cat) {
    const c = (cat || '').toLowerCase();
    if (c.includes('legal') || c.includes('contract')) return 'pill pill-orange';
    if (c.includes('financ') || c.includes('invoice')) return 'pill pill-green';
    return 'pill';
  }

  function renderStepTemplate(host) {
    host.appendChild(el('div', { class: 'step-head' },
      el('h2', null, 'Select Template'),
      el('p', null, 'What deliverable are you generating?'),
    ));
    const grid = el('div', { class: 'card-grid' });
    for (const t of state.templates) {
      const isSel = state.selectedTemplate?.slug === t.slug;
      const card = el('button', {
        class: 'select-card' + (isSel ? ' selected' : ''),
        type: 'button',
        onclick: () => { state.selectedTemplate = t; state.formValues = {}; state.missingIds = []; render(); },
      },
        el('div', { class: 'check' }, '✓'),
        el('div', { class: 'card-title' }, t.label),
        el('div', { class: 'card-desc' }, t.description),
        el('div', { class: 'card-meta' },
          el('span', { class: categoryPillClass(t.category) }, t.category),
          t.supports_images ? el('span', { style: 'color:var(--cyan);font-size:11px;' }, '📷 Supports images') : null,
        ),
      );
      grid.appendChild(card);
    }
    host.appendChild(grid);
    host.appendChild(navRow({
      next: advanceFromTemplate,
      nextDisabled: !state.selectedTemplate || state.loadingTemplate,
      nextLabel: state.loadingTemplate ? 'Loading…' : 'Next →',
    }));
  }

  async function advanceFromTemplate() {
    if (!state.selectedTemplate || state.loadingTemplate) return;
    const slug = state.selectedTemplate.slug;

    // Already have the full template for this slug? Skip the fetch.
    const cached = state.fullTemplateCache.get(slug);
    if (cached) {
      state.selectedTemplate = cached;
      state.step = 2;
      render();
      return;
    }

    state.loadingTemplate = true;
    render();
    try {
      const r = await fetch(API + '/api/apollo/templates/' + encodeURIComponent(slug), {
        credentials: 'include',
      });
      if (r.status === 401) { state.view = 'signed-out'; state.loadingTemplate = false; render(); return; }
      if (r.status === 403) { state.view = 'not-authorized'; state.loadingTemplate = false; render(); return; }
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const json = await r.json();
      if (!json.template) throw new Error('empty template payload');
      state.fullTemplateCache.set(slug, json.template);
      state.selectedTemplate = json.template;
      state.step = 2;
    } catch (err) {
      toast('Could not load template: ' + (err && err.message ? err.message : String(err)));
    } finally {
      state.loadingTemplate = false;
      render();
    }
  }

  // ---- Step 2: brand ----
  function renderStepBrand(host) {
    host.appendChild(el('div', { class: 'step-head' },
      el('h2', null, 'Select Brand'),
      el('p', null, 'Whose voice should the document carry?'),
    ));
    const grid = el('div', { class: 'card-grid grid-brands' });
    const toLoad = [];
    for (const b of state.brands) {
      const isSel = state.selectedBrand?.slug === b.slug;
      let logoNode;
      if (b.logo_url) {
        const img = el('img', { alt: b.label });
        logoNode = img;
        toLoad.push({ img, path: b.logo_url, slug: b.slug });
      } else {
        logoNode = el('div', { class: 'brand-ph' }, b.slug === 'other' ? '?' : '—');
      }
      const card = el('button', {
        class: 'brand-card' + (isSel ? ' selected' : ''),
        type: 'button',
        onclick: () => { state.selectedBrand = b; render(); },
      },
        el('div', { class: 'check' }, '✓'),
        logoNode,
        el('div', { class: 'brand-name' }, b.label),
        b.slug === 'habi' || b.slug === 'themis'
          ? el('div', { class: 'brand-note' }, 'Placeholder')
          : (b.slug === 'other' ? el('div', { class: 'brand-note' }, 'Unbranded') : null),
      );
      grid.appendChild(card);
    }
    host.appendChild(grid);
    host.appendChild(navRow({
      back: () => { state.step = 1; render(); },
      next: () => { if (state.selectedBrand) { state.step = 3; render(); } },
      nextDisabled: !state.selectedBrand,
    }));

    // Load brand logos with credentials
    for (const { img, path, slug } of toLoad) {
      if (state.brandLogos.has(slug)) { img.src = state.brandLogos.get(slug); continue; }
      fetch(API + path, { credentials: 'include' })
        .then(r => r.ok ? r.blob() : null)
        .then(blob => {
          if (blob) {
            const url = URL.createObjectURL(blob);
            state.brandLogos.set(slug, url);
            img.src = url;
          } else {
            const ph = el('div', { class: 'brand-ph' }, '—');
            img.replaceWith(ph);
          }
        })
        .catch(() => {
          const ph = el('div', { class: 'brand-ph' }, '—');
          img.replaceWith(ph);
        });
    }
  }

  // ---- Step 3: details ----
  function renderStepDetails(host) {
    const t = state.selectedTemplate;
    if (!t) { state.step = 1; render(); return; }
    host.appendChild(el('div', { class: 'step-head' },
      el('h2', null, 'Details'),
      el('p', null, 'Fill the required fields. Optional fields improve the output.'),
    ));
    const form = el('div', { class: 'form' });
    for (const f of t.fields) form.appendChild(renderField(f));
    host.appendChild(form);
    host.appendChild(navRow({
      back: () => { state.step = 2; render(); },
      next: () => goFromDetails(),
    }));
  }

  function renderField(f) {
    const isMissing = state.missingIds.includes(f.id);
    const wrap = el('div', { class: 'field' + (isMissing ? ' missing' : '') });
    const label = el('label', null,
      f.label,
      f.required ? el('span', { class: 'req' }, ' *') : null,
    );
    wrap.appendChild(label);
    const v = state.formValues[f.id];
    const setV = (val) => { state.formValues[f.id] = val; };
    let input;
    if (f.type === 'textarea') {
      input = el('textarea', {
        rows: 4,
        placeholder: f.placeholder || '',
        oninput: (e) => setV(e.target.value),
      });
      input.value = v != null ? v : '';
    } else if (f.type === 'date') {
      input = el('input', { type: 'date', oninput: (e) => setV(e.target.value) });
      input.value = v != null ? v : '';
    } else if (f.type === 'number') {
      input = el('input', {
        type: 'number',
        placeholder: f.placeholder || '',
        oninput: (e) => setV(e.target.value === '' ? '' : Number(e.target.value)),
      });
      input.value = (v == null || v === '') ? (f.default != null ? f.default : '') : v;
      if (v == null && f.default != null) state.formValues[f.id] = f.default;
    } else if (f.type === 'select') {
      input = el('select', { onchange: (e) => setV(e.target.value) });
      input.appendChild(el('option', { value: '' }, '— Select —'));
      for (const opt of (f.options || [])) input.appendChild(el('option', { value: opt }, opt));
      input.value = v != null ? v : '';
    } else if (f.type === 'multi_select') {
      const row = el('div', { class: 'chips' });
      const sel = Array.isArray(v) ? v.slice() : [];
      for (const opt of (f.options || [])) {
        const checked = sel.includes(opt);
        const chip = el('label', { class: 'chip' + (checked ? ' on' : '') },
          el('input', {
            type: 'checkbox',
            checked,
            onchange: (e) => {
              if (e.target.checked) { if (!sel.includes(opt)) sel.push(opt); }
              else { const i = sel.indexOf(opt); if (i >= 0) sel.splice(i, 1); }
              setV(sel.slice());
              chip.classList.toggle('on', e.target.checked);
            },
          }),
          opt,
        );
        row.appendChild(chip);
      }
      wrap.appendChild(row);
      if (f.help) wrap.appendChild(el('div', { class: 'help' }, f.help));
      return wrap;
    } else {
      input = el('input', {
        type: 'text',
        placeholder: f.placeholder || '',
        oninput: (e) => setV(e.target.value),
      });
      input.value = v != null ? v : '';
    }
    wrap.appendChild(input);
    if (isMissing) wrap.appendChild(el('div', { class: 'inline-err' }, 'This field is required.'));
    else if (f.help) wrap.appendChild(el('div', { class: 'help' }, f.help));
    return wrap;
  }

  function goFromDetails() {
    const t = state.selectedTemplate;
    if (!t) return;
    const missing = [];
    for (const f of t.fields) {
      if (!f.required) continue;
      const v = state.formValues[f.id];
      if (v == null || (typeof v === 'string' && v.trim() === '') || (Array.isArray(v) && v.length === 0)) {
        missing.push(f.id);
      }
    }
    state.missingIds = missing;
    if (missing.length > 0) { render(); return; }
    nextStep();
    render();
  }

  // ---- Step 4: images ----
  function renderStepImages(host) {
    host.appendChild(el('div', { class: 'step-head' },
      el('h2', null, 'Images'),
      el('p', null, 'Optional. Up to 10 images, 5 MB each. JPG, PNG, WebP.'),
    ));
    const dz = el('label', {
      class: 'drop-zone',
      ondragover: (e) => { e.preventDefault(); dz.classList.add('hot'); },
      ondragleave: () => dz.classList.remove('hot'),
      ondrop: (e) => { e.preventDefault(); dz.classList.remove('hot'); addImages(e.dataTransfer.files); },
    },
      el('input', {
        type: 'file',
        accept: 'image/jpeg,image/png,image/webp',
        multiple: true,
        style: 'display:none',
        onchange: (e) => addImages(e.target.files),
      }),
      uploadIcon(),
      el('div', { class: 'dz-headline' }, 'Drag images or click to browse'),
      el('div', { class: 'dz-sub' }, state.images.length + '/10 selected'),
    );
    host.appendChild(dz);
    if (state.images.length > 0) {
      const grid = el('div', { class: 'thumb-grid' });
      state.images.forEach((img, idx) => {
        const thumb = el('div', { class: 'thumb' },
          el('img', { src: URL.createObjectURL(img), alt: img.name }),
          el('div', { class: 'fname' }, img.name),
          el('button', {
            class: 'remove',
            type: 'button',
            'aria-label': 'Remove',
            onclick: () => { state.images.splice(idx, 1); render(); },
          }, '×'),
        );
        grid.appendChild(thumb);
      });
      host.appendChild(grid);
    }
    host.appendChild(navRow({
      back: () => { state.step = 3; render(); },
      next: () => { state.step = 5; render(); },
    }));
  }

  function uploadIcon() {
    const ns = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('viewBox', '0 0 24 24');
    svg.setAttribute('fill', 'none');
    svg.setAttribute('stroke', 'currentColor');
    svg.setAttribute('stroke-width', '2');
    svg.setAttribute('stroke-linecap', 'round');
    svg.setAttribute('stroke-linejoin', 'round');
    const parts = [
      'M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4',
      'M17 8l-5-5-5 5',
      'M12 3v12',
    ];
    for (const d of parts) {
      const p = document.createElementNS(ns, 'path');
      p.setAttribute('d', d);
      svg.appendChild(p);
    }
    return svg;
  }

  function addImages(fileList) {
    if (!fileList) return;
    for (const f of Array.from(fileList)) {
      if (!['image/jpeg', 'image/png', 'image/webp'].includes(f.type)) continue;
      if (f.size > 5 * 1024 * 1024) { toast(f.name + ' exceeds 5MB'); continue; }
      if (state.images.length >= 10) break;
      state.images.push(f);
    }
    render();
  }

  // ---- Step 5: review ----
  function renderStepReview(host) {
    const t = state.selectedTemplate;
    const b = state.selectedBrand;
    if (!t || !b) { state.step = 1; render(); return; }
    host.appendChild(el('div', { class: 'step-head' },
      el('h2', null, 'Mission Brief'),
      el('p', null, 'Review, then launch generation.'),
    ));
    const r = el('div', { class: 'review' });
    r.appendChild(el('h3', null, 'Mission'));
    r.appendChild(reviewRow('Template', t.label));
    r.appendChild(reviewRow('Brand', b.label));
    r.appendChild(reviewRow('Images', String(state.images.length)));
    for (const f of t.fields) {
      const v = state.formValues[f.id];
      const display = (v == null || v === '') ? '—' : (Array.isArray(v) ? v.join(', ') : String(v));
      r.appendChild(reviewRow(f.label, display));
    }
    host.appendChild(r);
    host.appendChild(renderStyleOptions());
    host.appendChild(el('div', {
      style: 'display:flex;justify-content:center;margin-top:28px;gap:12px;flex-wrap:wrap;'
    },
      el('button', { class: 'btn btn-secondary', onclick: () => { prevStep(); render(); } }, 'Back'),
      el('button', {
        class: 'btn btn-primary btn-lg',
        onclick: submit,
        disabled: state.submitting,
      }, state.submitting ? 'Launching…' : 'Generate Document'),
    ));
  }

  // Collapsible style-options block. Lets advanced users pick a typography
  // preset and a logo-placement scheme. Defaults are good; casual users
  // never need to open this.
  function renderStyleOptions() {
    const wrap = el('details', { class: 'style-options' });
    wrap.appendChild(el('summary', null, 'Style options (advanced)'));

    if (state.fontPresets.length > 0) {
      const fontSel = el('select', {
        class: 'so-select',
        onchange: (e) => {
          state.selectedFontPreset = e.target.value;
          // Re-render just this section to show the updated description.
          const parent = wrap.parentElement;
          if (parent) {
            const replacement = renderStyleOptions();
            replacement.open = true;
            parent.replaceChild(replacement, wrap);
          }
        },
      });
      for (const p of state.fontPresets) {
        const opt = el('option', { value: p.key }, p.label);
        if (p.key === state.selectedFontPreset) opt.selected = true;
        fontSel.appendChild(opt);
      }
      const fontDesc = (state.fontPresets.find((p) => p.key === state.selectedFontPreset) || {}).description || '';
      wrap.appendChild(el('label', { class: 'so-label' },
        el('span', { class: 'so-label-text' }, 'Typography preset'),
        fontSel,
        el('span', { class: 'so-desc' }, fontDesc),
      ));
    }

    if (state.logoPlacements.length > 0) {
      const placeSel = el('select', {
        class: 'so-select',
        onchange: (e) => {
          state.selectedLogoPlacement = e.target.value;
          const parent = wrap.parentElement;
          if (parent) {
            const replacement = renderStyleOptions();
            replacement.open = true;
            parent.replaceChild(replacement, wrap);
          }
        },
      });
      for (const p of state.logoPlacements) {
        const opt = el('option', { value: p.key }, p.label);
        if (p.key === state.selectedLogoPlacement) opt.selected = true;
        placeSel.appendChild(opt);
      }
      const placeDesc = (state.logoPlacements.find((p) => p.key === state.selectedLogoPlacement) || {}).description || '';
      wrap.appendChild(el('label', { class: 'so-label' },
        el('span', { class: 'so-label-text' }, 'Logo placement'),
        placeSel,
        el('span', { class: 'so-desc' }, placeDesc),
      ));
    }

    return wrap;
  }

  function reviewRow(k, v) {
    return el('div', { class: 'review-row' },
      el('div', { class: 'k' }, k),
      el('div', { class: 'v' }, v),
    );
  }

  async function submit() {
    const t = state.selectedTemplate;
    const b = state.selectedBrand;
    if (!t || !b) return;
    state.submitting = true;
    state.submitError = null;
    state.submitResult = null;
    state.step = 6;
    document.body.classList.add('generating');
    render();

    const form = new FormData();
    form.set('template_slug', t.slug);
    form.set('brand_slug', b.slug);
    form.set('inputs', JSON.stringify(state.formValues));
    if (state.selectedFontPreset) form.set('font_preset', state.selectedFontPreset);
    if (state.selectedLogoPlacement) form.set('logo_placement', state.selectedLogoPlacement);
    for (const img of state.images) form.append('images', img);

    try {
      const r = await fetch(API + '/api/apollo/submit', {
        method: 'POST',
        credentials: 'include',
        body: form,
      });
      if (r.status === 401) { state.view = 'signed-out'; document.body.classList.remove('generating'); render(); return; }
      if (r.status === 403) { state.view = 'not-authorized'; document.body.classList.remove('generating'); render(); return; }
      const json = await r.json().catch(() => ({}));
      if (!r.ok || !json.success) {
        throw new Error(json.error || ('HTTP ' + r.status));
      }
      state.submitResult = json;
    } catch (err) {
      state.submitError = err.message || String(err);
    } finally {
      state.submitting = false;
      document.body.classList.remove('generating');
      render();
    }
  }

  // ---- Step 6: result ----
  function renderStepResult(host) {
    if (state.submitting) {
      host.appendChild(el('div', { class: 'result-wrap' },
        rocketIcon(true),
        el('h2', null, 'Launching mission…'),
        el('p', { class: 'sub' },
          'Generating ' + (state.selectedTemplate?.label || '') + ' for ' + (state.selectedBrand?.label || '') + '.',
        ),
      ));
      return;
    }
    if (state.submitError) {
      host.appendChild(el('div', { class: 'result-wrap' },
        el('div', { class: 'err-card' },
          el('div', { class: 'err-title' }, 'Mission aborted'),
          el('pre', null, state.submitError),
        ),
        el('div', { class: 'result-actions', style: 'margin-top:20px;' },
          el('button', { class: 'btn btn-secondary', onclick: () => { state.step = 5; render(); } }, 'Try again'),
          el('button', { class: 'btn btn-secondary', onclick: reset }, 'New mission'),
        ),
      ));
      return;
    }
    if (state.submitResult) {
      host.appendChild(el('div', { class: 'result-wrap' },
        checkmarkSvg(),
        el('h2', null, 'Mission complete'),
        el('p', { class: 'sub' }, 'Deliverable packaged and ready for download.'),
        el('div', { class: 'result-actions' },
          el('a', {
            class: 'btn btn-primary btn-lg',
            href: state.submitResult.download_url,
            download: '',
            rel: 'noreferrer',
            target: '_blank',
          }, 'Download PDF ↓'),
        ),
        el('div', { class: 'expiry' }, 'Link expires in 7 days'),
        el('div', { class: 'result-actions', style: 'margin-top:24px;' },
          el('button', { class: 'btn btn-secondary', onclick: reset }, 'New mission'),
        ),
      ));
    }
  }

  function rocketIcon(launching) {
    const ns = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('viewBox', '0 0 24 24');
    svg.setAttribute('fill', 'none');
    svg.setAttribute('stroke', 'currentColor');
    svg.setAttribute('stroke-width', '1.6');
    svg.setAttribute('stroke-linecap', 'round');
    svg.setAttribute('stroke-linejoin', 'round');
    svg.setAttribute('class', 'launch-icon' + (launching ? ' launching' : ''));
    const parts = [
      'M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z',
      'M12 15l-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z',
      'M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0',
      'M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5',
    ];
    for (const d of parts) {
      const p = document.createElementNS(ns, 'path');
      p.setAttribute('d', d);
      svg.appendChild(p);
    }
    return svg;
  }

  function checkmarkSvg() {
    const ns = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('viewBox', '0 0 72 72');
    svg.setAttribute('class', 'checkmark');
    const c = document.createElementNS(ns, 'circle');
    c.setAttribute('cx', '36');
    c.setAttribute('cy', '36');
    c.setAttribute('r', '30');
    svg.appendChild(c);
    const p = document.createElementNS(ns, 'path');
    p.setAttribute('d', 'M22 38 L32 48 L52 26');
    svg.appendChild(p);
    return svg;
  }

  function reset() {
    state.step = 1;
    state.selectedTemplate = null;
    state.selectedBrand = null;
    state.formValues = {};
    state.missingIds = [];
    state.images = [];
    state.submitting = false;
    state.submitResult = null;
    state.submitError = null;
    render();
  }

  function navRow({ back, next, nextDisabled, nextLabel }) {
    const row = el('div', { class: 'nav-row' });
    if (back) {
      row.appendChild(el('button', { class: 'btn btn-secondary', onclick: back }, '← Back'));
    } else {
      row.appendChild(el('div', { class: 'spacer' }));
    }
    if (next) {
      row.appendChild(el('button', {
        class: 'btn btn-primary',
        onclick: next,
        disabled: !!nextDisabled,
      }, nextLabel || 'Next →'));
    }
    return row;
  }

  // ---- Boot ----
  bootstrap();
})();
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/apollo/service-worker.js').catch(() => {})
    })
  }
</script>

</body>
