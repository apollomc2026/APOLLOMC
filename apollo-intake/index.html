<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Apollo Mission Control</title>
  <link rel="manifest" href="/apollo/manifest.json">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Apollo">
  <link rel="apple-touch-icon" sizes="192x192" href="/apollo/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/apollo/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Shared theme — every page imports this -->
  <link rel="stylesheet" href="/apollo/shared/theme.css">

  <style>
  /* Page-specific layout only. Anything reused belongs in theme.css. */

  body[data-standby="true"] .stations-grid,
  body[data-standby="true"] .quick-launch,
  body[data-standby="true"] .mission-log {
    opacity: 0.32;
    pointer-events: none;
    filter: blur(2px);
    transition: filter 0.6s ease-out, opacity 0.6s ease-out;
  }

  /* Quick Launch */
  .quick-launch {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 24px;
    max-width: 1400px;
    margin: 0 auto;
    flex-wrap: wrap;
  }
  .ql-recent {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    flex: 1 1 auto;
    min-width: 0;
  }
  .ql-recent-btn {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 2px;
    background: rgba(10,10,15,0.55);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(107,227,255,0.18);
    border-radius: 8px;
    padding: 8px 14px;
    color: var(--text);
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: left;
  }
  .ql-recent-btn:hover {
    border-color: var(--cyan);
    background: rgba(10,10,15,0.75);
    transform: translateY(-1px);
  }
  .ql-recent-label { font-size: 13px; font-weight: 500; color: var(--text); }
  .ql-recent-time {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-3);
    letter-spacing: 0.05em;
  }
  .ql-recent-empty {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-4);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 12px 4px;
  }
  .ql-search {
    position: relative;
    flex: 0 1 320px;
    min-width: 240px;
    display: flex;
    align-items: center;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(107,227,255,0.2);
    border-radius: 8px;
    padding: 0 12px;
  }
  .ql-search:focus-within { border-color: var(--cyan); box-shadow: 0 0 0 2px rgba(107,227,255,0.15); }
  .ql-search-prefix {
    font-family: var(--font-mono);
    color: var(--cyan-dim);
    font-size: 13px;
    padding-right: 8px;
    border-right: 1px solid rgba(107,227,255,0.18);
  }
  .ql-search input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 10px 8px;
  }
  .ql-search input::placeholder { color: var(--text-4); }

  .search-overlay {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    right: 0;
    z-index: 200;
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(24px);
    border: 1px solid rgba(107,227,255,0.25);
    border-radius: 8px;
    padding: 6px;
    max-height: 320px;
    overflow-y: auto;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
  }
  .search-result {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .search-result:hover, .search-result[data-active="true"] { background: rgba(107,227,255,0.1); }
  .search-result-label { font-size: 13px; font-weight: 500; color: var(--text); }
  .search-result-meta {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-3);
    letter-spacing: 0.05em;
  }
  .search-empty {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-4);
    letter-spacing: 0.12em;
    text-align: center;
    padding: 14px;
  }

  /* Stations grid — 4×2 with 8 industry stations (6 active + 2 placeholder) */
  .stations-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 18px;
    padding: 16px 24px 32px;
    max-width: 1500px;
    margin: 0 auto;
    width: 100%;
  }
  @media (max-width: 1200px) { .stations-grid { grid-template-columns: repeat(3, 1fr); gap: 16px; } }
  @media (max-width: 900px)  { .stations-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; padding: 16px 16px 24px; } }
  @media (max-width: 600px)  { .stations-grid { grid-template-columns: 1fr; } }

  .station[data-placeholder="true"] .station-card {
    background: rgba(10,10,15,0.45);
    border-color: rgba(107,227,255,0.10);
  }
  .station[data-placeholder="true"] .station-card:hover {
    background: rgba(10,10,15,0.55);
    border-color: rgba(107,227,255,0.18);
    transform: none;
  }
  .station[data-placeholder="true"] .station-led {
    animation: none !important;
    background: rgba(107,227,255,0.35) !important;
    box-shadow: none !important;
  }
  .station-coming-soon {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.22em;
    color: rgba(107,227,255,0.55);
    border: 1px solid rgba(107,227,255,0.25);
    padding: 2px 6px;
    border-radius: 3px;
    margin-left: auto;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .station-icon {
    width: 18px;
    height: 18px;
    color: var(--cyan);
    flex-shrink: 0;
    opacity: 0.85;
  }
  .station[data-placeholder="true"] .station-icon { opacity: 0.45; }

  .deliverable-meta {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-3);
    letter-spacing: 0.05em;
  }

  .station { display: flex; flex-direction: column; }
  .station-card {
    background: rgba(10,10,15,0.55);
    backdrop-filter: blur(24px) saturate(140%);
    -webkit-backdrop-filter: blur(24px) saturate(140%);
    border: 1px solid rgba(107,227,255,0.15);
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    padding: 22px 24px;
    cursor: pointer;
    transition: background 0.3s var(--ease-out-expo),
                border-color 0.3s ease,
                transform 0.3s var(--ease-out-expo);
  }
  .station-card:hover {
    background: rgba(10,10,15,0.72);
    border-color: rgba(107,227,255,0.35);
    transform: translateY(-2px);
  }
  .station[data-armed="true"] .station-card {
    background: rgba(10,10,15,0.78);
    border-color: var(--cyan);
    box-shadow: 0 0 0 2px rgba(107,227,255,0.22), 0 12px 40px rgba(0,0,0,0.5);
  }
  .station-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .station-name {
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.18em;
    color: var(--text);
    margin: 0;
  }
  .station-sub { font-size: 12px; color: var(--text-3); margin: 2px 0 0 0; }
  .station-header-text { flex: 1; min-width: 0; }
  .station-meta {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 16px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-3);
    letter-spacing: 0.05em;
  }
  .station-count strong { color: var(--cyan); font-weight: 600; }
  .station-arm {
    background: rgba(107,227,255,0.12);
    border: 1px solid rgba(107,227,255,0.4);
    color: var(--text);
    padding: 8px 18px;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.22em;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .station-arm:hover { background: rgba(107,227,255,0.22); border-color: var(--cyan); }
  .station[data-armed="true"] .station-arm {
    background: rgba(107,227,255,0.3);
    border-color: var(--cyan);
    color: var(--cyan);
  }
  .station-deliverables {
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    margin-top: 0;
    transition: max-height 0.4s ease-out, opacity 0.3s ease-out, margin-top 0.4s ease-out;
  }
  .station[data-armed="true"] .station-deliverables { max-height: 800px; opacity: 1; margin-top: 12px; }
  .deliverable-launch {
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    align-items: center;
    gap: 14px;
    width: 100%;
    background: rgba(10,10,15,0.65);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(107,227,255,0.15);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text);
    font-family: inherit;
    cursor: pointer;
    margin-bottom: 8px;
    transition: all 0.2s ease;
    text-align: left;
  }
  .deliverable-launch:last-child { margin-bottom: 0; }
  .deliverable-launch:hover {
    border-color: var(--cyan);
    background: rgba(10,10,15,0.85);
    transform: translateX(2px);
  }
  .dl-icon { color: var(--cyan); font-family: var(--font-mono); font-size: 12px; }
  .dl-label { font-size: 14px; font-weight: 500; }
  .dl-action {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--cyan);
    letter-spacing: 0.18em;
    font-weight: 600;
  }

  /* Mission Log */
  .mission-log {
    background: rgba(10,10,15,0.7);
    backdrop-filter: blur(24px) saturate(140%);
    -webkit-backdrop-filter: blur(24px) saturate(140%);
    border-top: 1px solid rgba(107,227,255,0.18);
    margin-top: auto;
    padding: 16px 24px;
    max-width: 1400px;
    margin-left: auto;
    margin-right: auto;
    width: 100%;
  }
  .ml-summary { display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
  .ml-count, .ml-success {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .ml-count strong, .ml-success strong { color: var(--cyan); font-weight: 600; }
  .ml-toggle {
    margin-left: auto;
    background: transparent;
    border: 1px solid rgba(107,227,255,0.25);
    color: var(--text-2);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .ml-toggle:hover { border-color: var(--cyan); color: var(--cyan); }
  .ml-entries {
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transition: max-height 0.4s ease-out, opacity 0.3s ease-out, margin-top 0.4s ease-out;
  }
  .mission-log[data-expanded="true"] .ml-entries {
    max-height: 600px;
    overflow-y: auto;
    opacity: 1;
    margin-top: 12px;
  }
  .ml-entry {
    display: grid;
    grid-template-columns: auto 1fr auto auto auto;
    align-items: center;
    gap: 16px;
    padding: 12px 14px;
    border-bottom: 1px solid rgba(107,227,255,0.1);
    font-size: 13px;
  }
  .ml-entry:last-child { border-bottom: none; }
  .ml-entry-time {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-3);
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  .ml-entry-name { color: var(--text); font-weight: 500; }
  .ml-entry-brand {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-3);
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .ml-badge {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    padding: 3px 8px;
    border-radius: 999px;
  }
  .ml-badge.success { background: rgba(123,255,159,0.12); color: var(--green); }
  .ml-badge.error   { background: rgba(255,82,82,0.15);  color: #ff8a8a; }
  .ml-badge.pending { background: rgba(255,179,64,0.15); color: #ffb340; }
  .ml-entry-actions { display: flex; gap: 8px; }
  .ml-entry-actions a, .ml-entry-actions button {
    background: transparent;
    border: 1px solid rgba(107,227,255,0.25);
    color: var(--text-2);
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    padding: 4px 10px;
    border-radius: 4px;
    text-decoration: none;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .ml-entry-actions a:hover, .ml-entry-actions button:hover { border-color: var(--cyan); color: var(--cyan); }
  .ml-empty {
    text-align: center;
    padding: 24px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--text-4);
  }

  /* Placeholder industry CTA modal */
  .placeholder-cta-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.72);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 80;
    padding: 24px;
  }
  .placeholder-cta-panel {
    background: rgba(10,10,15,0.92);
    border: 1px solid rgba(107,227,255,0.4);
    border-radius: 12px;
    padding: 28px 32px;
    max-width: 520px;
    width: 100%;
    color: var(--text);
    font-family: var(--font-mono);
  }
  .placeholder-cta-panel h2 {
    margin: 0 0 12px;
    font-size: 14px;
    letter-spacing: 0.22em;
    color: var(--cyan);
  }
  .placeholder-cta-panel p {
    margin: 0 0 14px;
    font-size: 13px;
    line-height: 1.55;
    font-family: var(--font-body);
    color: var(--text-2);
  }
  .placeholder-cta-panel .pcta-actions { display: flex; gap: 12px; margin-top: 18px; }
  .placeholder-cta-panel button {
    background: rgba(107,227,255,0.12);
    border: 1px solid rgba(107,227,255,0.4);
    color: var(--text);
    padding: 10px 18px;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.22em;
    border-radius: 6px;
    cursor: pointer;
  }
  .placeholder-cta-panel button.primary { background: rgba(107,227,255,0.28); }

  /* Help overlay */
  .help-overlay {
    position: fixed;
    inset: 0;
    z-index: var(--z-help);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
  }
  .help-overlay[hidden] { display: none; }
  .help-overlay-panel {
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(30px);
    border: 1px solid rgba(107,227,255,0.3);
    border-radius: 12px;
    padding: 28px 36px;
    max-width: 480px;
    width: 100%;
    box-shadow: 0 24px 80px rgba(0,0,0,0.7);
  }
  .help-overlay h2 {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.18em;
    color: var(--cyan);
    margin: 0 0 18px 0;
    text-transform: uppercase;
  }
  .help-shortcuts {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 10px 18px;
    font-size: 13px;
  }
  .help-shortcuts kbd {
    font-family: var(--font-mono);
    font-size: 11px;
    background: rgba(107,227,255,0.12);
    border: 1px solid rgba(107,227,255,0.3);
    color: var(--cyan);
    padding: 3px 8px;
    border-radius: 4px;
    text-align: center;
    min-width: 56px;
  }
  .help-shortcuts span { color: var(--text-2); align-self: center; }

  @media (prefers-reduced-motion: reduce) {
    .station-deliverables, .ml-entries { transition-duration: 0.05s; }
    .station-card, .ql-recent-btn, .deliverable-launch { transition-duration: 0.05s; }
  }
  </style>
</head>
<body data-standby="true">

<!-- Hero, command bar, auth modal injected by JS at boot -->

<section class="quick-launch" aria-label="Quick launch">
  <div class="ql-recent" id="quickLaunchRecent">
    <div class="ql-recent-empty">— no recent deployments</div>
  </div>
  <div class="ql-search">
    <span class="ql-search-prefix">/</span>
    <input type="text" id="quickSearch" placeholder="search deliverables..." aria-label="Quick search" autocomplete="off">
    <div class="search-overlay" id="searchOverlay" hidden></div>
  </div>
</section>

<main class="stations-grid" id="stationsGrid" aria-label="Mission stations"></main>

<footer class="mission-log" data-expanded="false" aria-label="Mission log">
  <div class="ml-summary">
    <span class="ml-count"><strong id="missionCount">—</strong> missions deployed</span>
    <span class="ml-success"><strong id="successRate">—</strong> success rate</span>
    <button class="ml-toggle" id="missionLogToggle" type="button" aria-expanded="false" aria-controls="missionEntries">EXPAND ▼</button>
  </div>
  <div class="ml-entries" id="missionEntries" role="region" aria-hidden="true">
    <div class="ml-empty">No missions deployed yet. Arm a station to begin.</div>
  </div>
</footer>

<div class="help-overlay" id="helpOverlay" hidden role="dialog" aria-labelledby="helpOverlayTitle">
  <div class="help-overlay-panel">
    <h2 id="helpOverlayTitle">Keyboard Shortcuts</h2>
    <div class="help-shortcuts">
      <kbd>?</kbd>     <span>Toggle this help</span>
      <kbd>1–6</kbd>   <span>Arm Legal · Consulting · Government · Finance · Startup · Field Service</span>
      <kbd>/</kbd>     <span>Focus search</span>
      <kbd>Esc</kbd>   <span>Disarm / close overlays</span>
      <kbd>Enter</kbd> <span>Launch focused result</span>
    </div>
  </div>
</div>

<div id="toastHost"></div>

<script type="module">
import * as hero from '/apollo/shared/hero.js';
import * as authModal from '/apollo/shared/auth-modal.js';
import * as commandBar from '/apollo/shared/command-bar.js';
import { requireAuth } from '/apollo/shared/auth.js';
import { loadCatalog, invalidate as invalidateCatalog } from '/apollo/shared/catalog.js';
import { list as listSubmissions } from '/apollo/shared/submissions.js';
import { purgeOld as purgeDrafts } from '/apollo/shared/drafts.js';
import {
  toast, escapeHtml, escapeAttr, industryIconSvg,
  formatRelativeTime, formatTimestamp, formatPriceCents,
} from '/apollo/shared/ui.js';

// ---- Page state ----
const state = {
  catalog: { industries: [] },
  templates: [],
  submissions: [],
  totalSubmissions: 0,
  armedStation: null,
};

// ---- Boot ----
purgeDrafts();
hero.inject();
authModal.mount({ status: 'loading' });

requireAuth({
  onSignedOut: () => authModal.updateStatus({ status: 'signed-out' }),
  onNotAuthorized: (email) => authModal.updateStatus({ status: 'not-authorized', email }),
  onAuthed: async (user) => {
    authModal.dismiss();
    document.body.dataset.standby = 'false';

    commandBar.mount({
      user,
      brand: localStorage.getItem('apollo:brand') || 'apollo',
      brands: ['apollo', 'atlas', 'on-spot-solutions'],
      status: 'operational',
      onBrandChange: (slug) => {
        localStorage.setItem('apollo:brand', slug);
        renderStations();
        renderQuickLaunch();
      },
    });
    commandBar.startClock();

    try {
      const [catRes, subsRes] = await Promise.all([
        loadCatalog(),
        listSubmissions({ limit: 50 }),
      ]);
      state.catalog = catRes.catalog || { industries: [] };
      state.templates = catRes.templates || [];
      state.submissions = subsRes.submissions || [];
      state.totalSubmissions = subsRes.total_count || state.submissions.length;
    } catch (err) {
      toast('Catalog unavailable: ' + (err && err.message || String(err)), { variant: 'error' });
    }

    if (state.catalog.industries.length === 0) {
      const grid = document.getElementById('stationsGrid');
      if (grid) {
        grid.innerHTML = '<div class="ml-empty">Catalog unavailable — please refresh.</div>';
      }
    }

    renderStations();
    renderQuickLaunch();
    renderMissionLog();
    wireQuickSearch();
    wireMissionLogToggle();
    wireKeyboardShortcuts();
  },
});

// ---- Stations grid ----
function deliverableMetaLine(d) {
  const parts = [];
  if (typeof d.estimated_minutes === 'number' && d.estimated_minutes > 0) {
    parts.push(d.estimated_minutes + ' min');
  }
  if (typeof d.estimated_pages_min === 'number' && typeof d.estimated_pages_max === 'number') {
    if (d.estimated_pages_min === d.estimated_pages_max) parts.push(d.estimated_pages_min + 'p');
    else parts.push(d.estimated_pages_min + '–' + d.estimated_pages_max + 'p');
  }
  return parts.join(' · ');
}

function renderStations() {
  const grid = document.getElementById('stationsGrid');
  if (!grid) return;
  const industries = (state.catalog && state.catalog.industries) || [];
  if (industries.length === 0) return;
  const sorted = industries.slice().sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));

  grid.innerHTML = sorted.map((ind) => {
    const isPlaceholder = ind.status === 'placeholder';
    const deliverables = ind.deliverables || [];
    const ledState = isPlaceholder ? 'degraded' : 'ready';

    const slugSet = new Set(deliverables.map((d) => d.slug));
    const lastSubmission = (state.submissions || [])
      .filter((s) => slugSet.has(s.template_slug))
      .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];

    let lastLine;
    if (isPlaceholder) {
      lastLine = 'Send a sample to spec this industry';
    } else if (lastSubmission) {
      const t = state.templates.find((x) => x.slug === lastSubmission.template_slug);
      lastLine = 'Last: ' + (t?.label || lastSubmission.template_slug) +
        ' · ' + formatRelativeTime(lastSubmission.created_at);
    } else {
      lastLine = 'No deployments yet';
    }

    const armLabel = isPlaceholder ? 'REQUEST ACCESS' : 'ARM';
    const countLine = isPlaceholder
      ? '<div class="station-count">—</div>'
      : '<div class="station-count"><strong>' + deliverables.length + '</strong> deliverables loaded</div>';
    const comingSoon = isPlaceholder ? '<span class="station-coming-soon">Coming soon</span>' : '';

    return (
      '<div class="station" data-station="' + escapeAttr(ind.slug) + '"' +
        ' data-armed="false" data-placeholder="' + (isPlaceholder ? 'true' : 'false') + '">' +
        '<div class="station-card" tabindex="0" role="button" aria-pressed="false">' +
          '<div class="station-header">' +
            '<span class="station-led" data-state="' + ledState + '"></span>' +
            industryIconSvg(ind.icon_key) +
            '<div class="station-header-text">' +
              '<h2 class="station-name">' + escapeHtml((ind.label || ind.slug).toUpperCase()) + '</h2>' +
              '<p class="station-sub">' + escapeHtml(ind.description || '') + '</p>' +
            '</div>' +
            comingSoon +
          '</div>' +
          '<div class="station-meta">' +
            countLine +
            '<div class="station-last">' + escapeHtml(lastLine) + '</div>' +
          '</div>' +
          '<button class="station-arm" type="button" aria-expanded="false" aria-controls="station-' + escapeAttr(ind.slug) + '-deliverables">' + armLabel + '</button>' +
        '</div>' +
        '<div class="station-deliverables" id="station-' + escapeAttr(ind.slug) + '-deliverables" role="region" aria-hidden="true">' +
          (isPlaceholder ? '' : deliverables.map((d) => {
            const price = formatPriceCents(d.base_price_cents);
            const meta = deliverableMetaLine(d);
            const priceBlock = price
              ? '<span class="deliverable-meta"><span class="price-strike">' + escapeHtml(price) + '</span><span class="price-active">FREE PREVIEW</span>' + (meta ? ' · ' + escapeHtml(meta) : '') + '</span>'
              : (meta ? '<span class="deliverable-meta">' + escapeHtml(meta) + '</span>' : '<span class="deliverable-meta">—</span>');
            return (
              '<button class="deliverable-launch" data-slug="' + escapeAttr(d.slug) + '" type="button">' +
                '<span class="dl-icon">▶</span>' +
                '<span class="dl-label">' + escapeHtml(d.label) + '</span>' +
                priceBlock +
                '<span class="dl-action">LAUNCH</span>' +
              '</button>'
            );
          }).join('')) +
        '</div>' +
      '</div>'
    );
  }).join('');

  wireStationEvents();
}

function armStation(stationKey) {
  document.querySelectorAll('.station[data-armed="true"]').forEach((s) => {
    s.dataset.armed = 'false';
    const arm = s.querySelector('.station-arm');
    if (arm) {
      arm.setAttribute('aria-expanded', 'false');
      arm.textContent = s.dataset.placeholder === 'true' ? 'REQUEST ACCESS' : 'ARM';
    }
    const card = s.querySelector('.station-card');
    if (card) card.setAttribute('aria-pressed', 'false');
    const dv = s.querySelector('.station-deliverables');
    if (dv) dv.setAttribute('aria-hidden', 'true');
  });

  state.armedStation = stationKey || null;
  if (!stationKey) return;

  const stationEl = document.querySelector('.station[data-station="' + stationKey + '"]');
  if (!stationEl) return;

  if (stationEl.dataset.placeholder === 'true') {
    state.armedStation = null;
    openPlaceholderModal(stationKey);
    return;
  }

  stationEl.dataset.armed = 'true';
  const arm = stationEl.querySelector('.station-arm');
  if (arm) {
    arm.setAttribute('aria-expanded', 'true');
    arm.textContent = 'ARMED';
  }
  const card = stationEl.querySelector('.station-card');
  if (card) card.setAttribute('aria-pressed', 'true');
  const dv = stationEl.querySelector('.station-deliverables');
  if (dv) dv.setAttribute('aria-hidden', 'false');
}

function openPlaceholderModal(industrySlug) {
  const ind = (state.catalog?.industries || []).find((i) => i.slug === industrySlug);
  if (!ind) return;
  closePlaceholderModal();
  const cta = ind.placeholder_cta ||
    'Send a sample deliverable to spec this industry. We will build a custom intake module from it.';
  const modal = document.createElement('div');
  modal.className = 'placeholder-cta-modal';
  modal.id = 'placeholderCtaModal';
  modal.innerHTML = (
    '<div class="placeholder-cta-panel" role="dialog" aria-modal="true" aria-labelledby="placeholderCtaTitle">' +
      '<h2 id="placeholderCtaTitle">' + escapeHtml((ind.label || ind.slug).toUpperCase()) + ' — REQUEST ACCESS</h2>' +
      '<p>' + escapeHtml(cta) + '</p>' +
      '<p>Email <strong>support@apollomc.ai</strong> with a sample deliverable from your industry. We will spin up a bespoke intake module within 48 hours.</p>' +
      '<div class="pcta-actions">' +
        '<button class="primary" type="button" data-action="email">EMAIL SUPPORT</button>' +
        '<button type="button" data-action="close">CLOSE</button>' +
      '</div>' +
    '</div>'
  );
  document.body.appendChild(modal);
  modal.addEventListener('click', (e) => { if (e.target === modal) closePlaceholderModal(); });
  modal.querySelector('[data-action="close"]').addEventListener('click', closePlaceholderModal);
  modal.querySelector('[data-action="email"]').addEventListener('click', () => {
    const subject = encodeURIComponent('Apollo MC — request access: ' + (ind.label || ind.slug));
    window.location.href = 'mailto:support@apollomc.ai?subject=' + subject;
    closePlaceholderModal();
  });
}
function closePlaceholderModal() {
  const m = document.getElementById('placeholderCtaModal');
  if (m) m.remove();
}

let stationGridListenerBound = false;
function wireStationEvents() {
  document.querySelectorAll('.station').forEach((s) => {
    const key = s.dataset.station;
    const armBtn = s.querySelector('.station-arm');
    const card = s.querySelector('.station-card');
    const toggle = () => {
      if (s.dataset.placeholder === 'true') {
        openPlaceholderModal(key);
        return;
      }
      armStation(state.armedStation === key ? null : key);
    };
    if (armBtn) armBtn.addEventListener('click', (e) => { e.stopPropagation(); toggle(); });
    if (card) {
      card.addEventListener('click', toggle);
      card.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); }
      });
    }
  });
  const grid = document.getElementById('stationsGrid');
  if (grid && !stationGridListenerBound) {
    stationGridListenerBound = true;
    grid.addEventListener('click', (e) => {
      const btn = e.target.closest('.deliverable-launch');
      if (!btn) return;
      e.stopPropagation();
      launchDeliverable(btn.dataset.slug);
    });
  }
}

// ---- Quick Launch ----
function renderQuickLaunch() {
  const container = document.getElementById('quickLaunchRecent');
  if (!container) return;
  const recent = (state.submissions || []).slice(0, 3);
  if (recent.length === 0) {
    container.innerHTML = '<div class="ql-recent-empty">— no recent deployments</div>';
    return;
  }
  container.innerHTML = recent.map((s) => {
    const tmpl = state.templates.find((t) => t.slug === s.template_slug);
    const label = tmpl?.label || s.template_label || s.template_slug;
    return (
      '<button class="ql-recent-btn" data-slug="' + escapeAttr(s.template_slug) + '" type="button">' +
        '<span class="ql-recent-label">' + escapeHtml(label) + '</span>' +
        '<span class="ql-recent-time">' + escapeHtml(formatRelativeTime(s.created_at)) + '</span>' +
      '</button>'
    );
  }).join('');
  container.querySelectorAll('.ql-recent-btn').forEach((btn) => {
    btn.addEventListener('click', () => launchDeliverable(btn.dataset.slug));
  });
}

// ---- Slash-command search ----
let searchActiveIndex = -1;
function wireQuickSearch() {
  const input = document.getElementById('quickSearch');
  const overlay = document.getElementById('searchOverlay');
  if (!input || !overlay) return;
  input.addEventListener('focus', () => { filterSearchResults(input.value); overlay.hidden = false; });
  input.addEventListener('input', () => { filterSearchResults(input.value); overlay.hidden = false; });
  input.addEventListener('keydown', (e) => {
    const items = overlay.querySelectorAll('.search-result');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      searchActiveIndex = Math.min(searchActiveIndex + 1, items.length - 1);
      highlightSearchActive();
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      searchActiveIndex = Math.max(searchActiveIndex - 1, 0);
      highlightSearchActive();
    } else if (e.key === 'Enter') {
      e.preventDefault();
      const item = items[searchActiveIndex] || items[0];
      if (item) {
        const slug = item.dataset.slug;
        input.value = '';
        overlay.hidden = true;
        input.blur();
        launchDeliverable(slug);
      }
    } else if (e.key === 'Escape') {
      overlay.hidden = true;
      input.blur();
    }
  });
  document.addEventListener('click', (e) => {
    if (!overlay.contains(e.target) && e.target !== input) overlay.hidden = true;
  });
}
function filterSearchResults(query) {
  const overlay = document.getElementById('searchOverlay');
  if (!overlay) return;
  const q = (query || '').trim().toLowerCase();
  const matches = state.templates.filter((t) => {
    if (!q) return true;
    return (t.label || '').toLowerCase().includes(q) ||
           (t.description || '').toLowerCase().includes(q) ||
           (t.slug || '').toLowerCase().includes(q) ||
           (t.category || '').toLowerCase().includes(q);
  }).slice(0, 12);
  if (matches.length === 0) {
    overlay.innerHTML = '<div class="search-empty">— no deliverables match —</div>';
    searchActiveIndex = -1;
    return;
  }
  overlay.innerHTML = matches.map((t, i) => {
    const station = stationKeyForSlug(t.slug) || '';
    return (
      '<div class="search-result" data-slug="' + escapeAttr(t.slug) + '" data-active="' + (i === 0 ? 'true' : 'false') + '">' +
        '<span class="search-result-label">' + escapeHtml(t.label) + '</span>' +
        '<span class="search-result-meta">' + escapeHtml((station || t.category || 'deliverable').toUpperCase()) + ' · ' + escapeHtml(t.slug) + '</span>' +
      '</div>'
    );
  }).join('');
  searchActiveIndex = 0;
  overlay.querySelectorAll('.search-result').forEach((rEl) => {
    rEl.addEventListener('click', () => {
      const input = document.getElementById('quickSearch');
      if (input) { input.value = ''; input.blur(); }
      overlay.hidden = true;
      launchDeliverable(rEl.dataset.slug);
    });
  });
}
function highlightSearchActive() {
  const overlay = document.getElementById('searchOverlay');
  if (!overlay) return;
  overlay.querySelectorAll('.search-result').forEach((rEl, i) => {
    rEl.dataset.active = String(i === searchActiveIndex);
  });
}
function stationKeyForSlug(slug) {
  const industries = (state.catalog && state.catalog.industries) || [];
  for (const ind of industries) {
    if ((ind.deliverables || []).some((d) => d.slug === slug)) return ind.slug;
  }
  return null;
}

// ---- Mission Log ----
function renderMissionLog() {
  const countEl = document.getElementById('missionCount');
  const successEl = document.getElementById('successRate');
  if (countEl) countEl.textContent = String(state.totalSubmissions || 0);
  const failed = state.submissions.filter((s) => s.status === 'failed').length;
  const successPct = state.totalSubmissions > 0
    ? Math.round((1 - failed / state.totalSubmissions) * 100)
    : 100;
  if (successEl) successEl.textContent = successPct + '%';

  const entriesEl = document.getElementById('missionEntries');
  if (!entriesEl) return;
  if (state.submissions.length === 0) {
    entriesEl.innerHTML = '<div class="ml-empty">No missions deployed yet. Arm a station to begin.</div>';
    return;
  }
  const visible = state.submissions.slice(0, 10);
  entriesEl.innerHTML = visible.map((s) => {
    const tmpl = state.templates.find((t) => t.slug === s.template_slug);
    const label = tmpl?.label || s.template_label || s.template_slug;
    const badge = s.status === 'delivered' || s.status === 'completed'
      ? '<span class="ml-badge success">✓ COMPLETE</span>'
      : s.status === 'failed'
      ? '<span class="ml-badge error">✗ FAILED</span>'
      : '<span class="ml-badge pending">⋯ ' + escapeHtml((s.status || 'pending').toUpperCase()) + '</span>';
    const dl = s.download_url && (s.status === 'delivered' || s.status === 'completed')
      ? '<a href="' + escapeAttr(s.download_url) + '" target="_blank" rel="noopener noreferrer">DOWNLOAD</a>'
      : '';
    const view = '<a href="/apollo/mission.html?id=' + escapeAttr(s.id) + '">VIEW</a>';
    const clone = '<button data-action="clone" data-slug="' + escapeAttr(s.template_slug) + '" type="button">CLONE</button>';
    return (
      '<div class="ml-entry" data-id="' + escapeAttr(s.id) + '">' +
        '<span class="ml-entry-time">' + escapeHtml(formatTimestamp(s.created_at)) + '</span>' +
        '<span class="ml-entry-name">' + escapeHtml(label) + '</span>' +
        '<span class="ml-entry-brand">' + escapeHtml(s.brand_slug || '') + '</span>' +
        badge +
        '<span class="ml-entry-actions">' + view + dl + clone + '</span>' +
      '</div>'
    );
  }).join('');
  entriesEl.querySelectorAll('button[data-action="clone"]').forEach((btn) => {
    btn.addEventListener('click', () => launchDeliverable(btn.dataset.slug));
  });
}
function wireMissionLogToggle() {
  const toggle = document.getElementById('missionLogToggle');
  const log = document.querySelector('.mission-log');
  const entries = document.getElementById('missionEntries');
  if (!toggle || !log || !entries) return;
  toggle.addEventListener('click', () => {
    const expanded = log.dataset.expanded === 'true';
    log.dataset.expanded = expanded ? 'false' : 'true';
    toggle.setAttribute('aria-expanded', String(!expanded));
    entries.setAttribute('aria-hidden', String(expanded));
    toggle.textContent = expanded ? 'EXPAND ▼' : 'COLLAPSE ▲';
  });
}

// ---- Keyboard shortcuts ----
function wireKeyboardShortcuts() {
  document.addEventListener('keydown', (e) => {
    const inInput = e.target.matches('input, textarea, [contenteditable="true"]');
    if (e.key === '?' && !inInput) {
      e.preventDefault();
      toggleHelpOverlay();
      return;
    }
    if (inInput) {
      if (e.key === 'Escape' && e.target.id === 'quickSearch') {
        const overlay = document.getElementById('searchOverlay');
        if (overlay) overlay.hidden = true;
        e.target.blur();
      }
      return;
    }
    if (e.key === '/') {
      e.preventDefault();
      const input = document.getElementById('quickSearch');
      if (input) input.focus();
      return;
    }
    if (e.key === 'Escape') {
      const help = document.getElementById('helpOverlay');
      if (help && !help.hidden) { help.hidden = true; return; }
      const search = document.getElementById('searchOverlay');
      if (search && !search.hidden) { search.hidden = true; return; }
      if (state.armedStation) { armStation(null); return; }
      return;
    }
    if (/^[1-6]$/.test(e.key)) {
      const sorted = ((state.catalog?.industries) || [])
        .filter((i) => i.status !== 'placeholder')
        .slice()
        .sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));
      const target = sorted[parseInt(e.key, 10) - 1];
      if (target) {
        e.preventDefault();
        armStation(target.slug);
      }
    }
  });
}
function toggleHelpOverlay() {
  const help = document.getElementById('helpOverlay');
  if (!help) return;
  help.hidden = !help.hidden;
}

// ---- Navigation ----
function launchDeliverable(slug) {
  if (!slug) return;
  window.location.href = '/apollo/launch.html?slug=' + encodeURIComponent(slug);
}

// Suppress unused-import warning on invalidateCatalog — exposed for future
// "force-refresh after submit" flows from this page.
void invalidateCatalog;
</script>

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/apollo/service-worker.js').catch(() => {});
    });
  }
</script>
